<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel ADM - Dermatologia 2026</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .header-adm { background: white; padding: 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 8px solid #fb8c00; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .header-info { display: flex; align-items: center; gap: 15px; }
        .header-info h2 { margin: 0; color: #0a2c6d; font-size: 1.2rem; text-transform: uppercase; }
        .btn-group { display: flex; gap: 10px; }
        .btn-relatorio { background: #2ecc71; color: white; padding: 10px 15px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; }
        .btn-reset { background: #d32f2f; color: white; padding: 10px 15px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; }
        .stats-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .stat-card h3 { font-size: 0.7rem; color: #888; text-transform: uppercase; margin: 0; }
        .stat-card p { font-size: 2rem; font-weight: bold; color: #0a2c6d; margin: 10px 0 0; }
        .search-box { background: white; padding: 15px; border-radius: 10px; display: flex; gap: 10px; margin-bottom: 10px; }
        input#busca { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .btn-atualizar { background: #0a2c6d; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        table { width: 100%; background: white; border-collapse: collapse; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        th { background: #f8f9fa; padding: 12px; font-size: 0.7rem; color: #999; text-align: left; border-bottom: 2px solid #eee; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.85rem; color: #333; }
        tr:hover { background: #fcfcfc; }
        .btn-del { background: none; border: none; cursor: pointer; color: #d32f2f; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="header-adm">
    <div class="header-info">
        <img src="https://raw.githubusercontent.com/gestaob6cbax/INSPECAO-MEDICA-CBA-X-2026/main/logo_cba_x.png" width="50">
        <div>
            <h2>Gestão de Inspeção Dermatológica</h2>
            <p style="margin:0; font-size: 0.7rem; color: #888; font-weight: bold;">CBA X - 6ª SEÇÃO</p>
        </div>
    </div>
    <div class="btn-group">
        <button class="btn-relatorio" onclick="baixarRelatorio()">📥 Baixar Relatório (Excel)</button>
        <button class="btn-reset" onclick="resetarSistema()">⚠️ Resetar Sistema</button>
    </div>
</div>

<div class="stats-container">
    <div class="stat-card"><h3>Total Agendados</h3><p id="total">0</p></div>
    <div class="stat-card"><h3>Polo Recreio</h3><p id="totalRecreio">0</p></div>
    <div class="stat-card"><h3>Outros Polos</h3><p id="totalOutros">0</p></div>
</div>

<div class="search-box">
    <input type="text" id="busca" placeholder="Pesquise por Nome, RG, Unidade ou Polo..." onkeyup="filtrar()">
    <button class="btn-atualizar" onclick="carregarDados()">🔄 Atualizar Lista</button>
</div>

<table id="tabelaADM">
    <thead>
        <tr>
            <th>DATA</th>
            <th>ORIGEM (Serve)</th>
            <th>POLO (Local)</th>
            <th>POSTO</th>
            <th>NOME COMPLETO</th>
            <th>RG</th>
            <th>CONTATO</th>
            <th>AÇÕES</th>
        </tr>
    </thead>
    <tbody id="corpoTabela"></tbody>
</table>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY", 
        authDomain: "inspecao-saude-cbax.firebaseapp.com", 
        projectId: "inspecao-saude-cbax", 
        storageBucket: "inspecao-saude-cbax.firebasestorage.app", 
        messagingSenderId: "1011281662526", 
        appId: "1:1011281662526:web:1028e8a8d140684e98376f" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let todosOsDados = [];

    async function carregarDados() {
        const snap = await db.collection("agendamentos_dermato").orderBy("timestamp", "desc").get();
        todosOsDados = [];
        
        snap.forEach(doc => {
            const d = doc.data();
            todosOsDados.push({ id: doc.id, ...d });
        });
        
        renderizar(todosOsDados);
    }

    function renderizar(lista) {
        let html = "";
        let countRecreio = 0;

        lista.forEach(d => {
            if(d.local === "RECREIO") countRecreio++;
            
            html += `<tr>
                <td><strong>${d.data}</strong></td>
                <td>${d.unidadeOrigem || 'CBA X'}</td>
                <td><small>${d.localTexto || d.local}</small></td>
                <td>${d.posto}</td>
                <td><strong>${d.nome}</strong></td>
                <td>${d.rg}</td>
                <td style="font-size: 0.7rem;">${d.telefone || '-'}<br>${d.email || '-'}</td>
                <td><button class="btn-del" onclick="excluir('${d.id}')">🗑️</button></td>
            </tr>`;
        });

        document.getElementById("corpoTabela").innerHTML = html;
        document.getElementById("total").innerText = lista.length;
        document.getElementById("totalRecreio").innerText = countRecreio;
        document.getElementById("totalOutros").innerText = lista.length - countRecreio;
    }

    function filtrar() {
        const termo = document.getElementById("busca").value.toUpperCase();
        const filtrados = todosOsDados.filter(d => 
            d.nome.includes(termo) || 
            d.rg.includes(termo) || 
            d.unidadeOrigem.toUpperCase().includes(termo) ||
            (d.localTexto && d.localTexto.toUpperCase().includes(termo))
        );
        renderizar(filtrados);
    }

    async function excluir(id) {
        if(confirm("Deseja realmente excluir este agendamento?")) {
            await db.collection("agendamentos_dermato").doc(id).delete();
            carregarDados();
        }
    }

    async function resetarSistema() {
        if(confirm("⚠️ ATENÇÃO: Isso apagará TODOS os dados permanentemente. Confirma?")) {
            const snap = await db.collection("agendamentos_dermato").get();
            const batch = db.batch();
            snap.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
            alert("Sistema limpo com sucesso!");
            carregarDados();
        }
    }

    function baixarRelatorio() {
        const ws = XLSX.utils.json_to_sheet(todosOsDados.map(d => ({
            Data: d.data,
            Posto: d.posto,
            Nome: d.nome,
            RG: d.rg,
            Unidade_Origem: d.unidadeOrigem,
            Polo_Atendimento: d.localTexto,
            Telefone: d.telefone,
            Email: d.email
        })));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Dermatologia");
        XLSX.writeFile(wb, "Relatorio_Dermato_CBAX_2026.xlsx");
    }

    window.onload = carregarDados;
</script>
</body>
</html>
