<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM Premium - Dermatologia 2026</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root { 
            --cba-orange: #fb8c00; 
            --cba-blue: #0a2c6d; 
            --bg: #f4f7f6;
            --success: #2e7d32;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }

        /* Header Premium */
        header { 
            background: white; padding: 20px 30px; border-radius: 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); border-left: 10px solid var(--cba-orange);
            margin-bottom: 25px;
        }

        .header-info h1 { margin: 0; color: var(--cba-blue); font-size: 1.6rem; }
        .header-info p { margin: 5px 0 0; color: #666; font-weight: bold; font-size: 0.8rem; }

        /* Cards de Estatísticas */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { 
            background: white; padding: 20px; border-radius: 15px; text-align: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-bottom: 4px solid var(--cba-orange);
        }
        .stat-card h3 { margin: 0; color: #888; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card p { margin: 10px 0 0; font-size: 2.2rem; font-weight: bold; color: var(--cba-blue); }

        /* Controles */
        .controls-box { 
            background: white; padding: 20px; border-radius: 15px; display: flex; 
            gap: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); align-items: center;
        }
        #lupa { flex-grow: 1; padding: 12px 20px; border: 2px solid #eee; border-radius: 10px; font-size: 1rem; outline: none; }

        .btn { 
            padding: 12px 20px; border: none; border-radius: 10px; font-weight: bold; 
            cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.3s; color: white;
        }
        .btn-excel { background: var(--success); }
        .btn-refresh { background: var(--cba-blue); }

        /* Tabela Premium */
        .table-container { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 15px; text-align: left; font-size: 0.7rem; color: #888; border-bottom: 2px solid #eee; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #f1f1f1; font-size: 0.85rem; color: #333; }
        tr:hover { background: #fffaf4; }

        .badge-unidade { background: #eee; padding: 4px 8px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 20px;">
        <img src="https://raw.githubusercontent.com/gestaob6cbax/INSPECAO-MEDICA-CBA-X-2026/main/logo_cba_x.png" width="60">
        <div class="header-info">
            <h1>Gestão Dermatologia 2026</h1>
            <p>PAINEL DE CONTROLE ADMINISTRATIVO - CBA X</p>
        </div>
    </div>
    <button class="btn btn-excel" onclick="baixarExcel()">📥 Exportar Excel</button>
</header>

<div class="stats-grid">
    <div class="stat-card"><h3>Total Inscritos</h3><p id="totalGeral">0</p></div>
    <div class="stat-card"><h3>CER Barra</h3><p id="totalCER">0</p></div>
    <div class="stat-card"><h3>GMARs/DBMs</h3><p id="totalOutros">0</p></div>
</div>

<div class="controls-box">
    <input type="text" id="lupa" placeholder="🔍 Pesquise por Nome, RG, Unidade ou Data..." onkeyup="filtrar()">
    <button class="btn btn-refresh" onclick="carregarDados()">🔄 Atualizar Dados</button>
</div>

<div class="table-container">
    <table id="tabelaDados">
        <thead>
            <tr>
                <th>Data Inspeção</th>
                <th>Militar</th>
                <th>RG</th>
                <th>Origem (Onde Serve)</th>
                <th>Local Inspeção</th>
                <th>Contato</th>
            </tr>
        </thead>
        <tbody id="corpoTabela">
            <tr><td colspan="6" style="text-align:center; padding:50px;">Carregando registros...</td></tr>
        </tbody>
    </table>
</div>

<script>
    // Mesma configuração do seu Firebase
    const firebaseConfig = { 
        apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY",
        authDomain: "inspecao-saude-cbax.firebaseapp.com",
        projectId: "inspecao-saude-cbax",
        storageBucket: "inspecao-saude-cbax.firebasestorage.app",
        messagingSenderId: "1011281662526",
        appId: "1:1011281662526:web:1028e8a8d140684e98376f"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function carregarDados() {
        const corpo = document.getElementById("corpoTabela");
        try {
            const snap = await db.collection("agendamentos_dermato").orderBy("timestamp", "desc").get();
            let html = "";
            let cer = 0, outros = 0;

            snap.forEach(doc => {
                const d = doc.data();
                if(d.unidadeDestino === "CER") cer++; else outros++;

                html += `<tr>
                    <td><b>${d.data}</b></td>
                    <td>${d.posto} ${d.nome}</td>
                    <td><code>${d.rg}</code></td>
                    <td><span class="badge-unidade">${d.unidadeOrigem}</span></td>
                    <td>${d.localNome}</td>
                    <td><small>${d.telefone}<br>${d.email}</small></td>
                </tr>`;
            });

            corpo.innerHTML = html || '<tr><td colspan="6" style="text-align:center;">Nenhum agendamento encontrado.</td></tr>';
            document.getElementById("totalGeral").innerText = snap.size;
            document.getElementById("totalCER").innerText = cer;
            document.getElementById("totalOutros").innerText = outros;

        } catch (e) {
            console.error(e);
            corpo.innerHTML = '<tr><td colspan="6" style="text-align:center; color:red;">Erro ao conectar com o banco de dados.</td></tr>';
        }
    }

    function filtrar() {
        const busca = document.getElementById("lupa").value.toUpperCase();
        const linhas = document.querySelectorAll("#corpoTabela tr");
        linhas.forEach(linha => {
            linha.style.display = linha.innerText.toUpperCase().includes(busca) ? "" : "none";
        });
    }

    function baixarExcel() {
        const wb = XLSX.utils.table_to_book(document.getElementById("tabelaDados"));
        XLSX.writeFile(wb, "Relatorio_Dermatologia_2026.xlsx");
    }

    window.onload = carregarDados;
</script>
</body>
</html>
