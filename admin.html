<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ADM - DERMATOLOGIA 2026</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
        :root { --cba-orange: #fb8c00; --cba-blue: #0a2c6d; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        header { background: var(--cba-blue); color: white; padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; border-bottom: 5px solid var(--cba-orange); }
        .controls { background: white; padding: 15px; border-radius: 12px; margin: 20px 0; display: flex; gap: 10px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 15px; overflow: hidden; }
        th { background: #f8f9fa; padding: 15px; text-align: left; font-size: 11px; color: #888; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #f1f1f1; font-size: 13px; }
        button { padding: 10px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; }
        .btn-excel { background: #2e7d32; color: white; }
    </style>
</head>
<body>
<header>
    <div><h1>Controle Dermato 2026</h1><p>CBA X</p></div>
    <div style="background:rgba(255,255,255,0.2); padding:10px; border-radius:10px;">Total: <strong id="total">0</strong></div>
</header>
<div class="controls">
    <input type="text" id="lupa" placeholder="🔍 Filtrar..." onkeyup="filtrar()" style="flex-grow:1; padding:10px;">
    <button class="btn-excel" onclick="baixarExcel()">📥 EXCEL</button>
    <button onclick="carregar()">🔄 Atualizar</button>
</div>
<table>
    <thead><tr><th>Data</th><th>Unidade</th><th>Posto</th><th>Nome</th><th>RG</th><th>Ações</th></tr></thead>
    <tbody id="tabelaBody"></tbody>
</table>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDDWZDSNvsXyKDl0T54ROn_pOUSUGheQZw",
        authDomain: "inspecao-dermatologia-cbax.firebaseapp.com",
        projectId: "inspecao-dermatologia-cbax",
        storageBucket: "inspecao-dermatologia-cbax.firebasestorage.app",
        messagingSenderId: "513142138310",
        appId: "1:513142138310:web:74cb653c48f574541dfec7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function carregar() {
        const snap = await db.collection("agendamentos").get();
        let html = "";
        let count = 0;
        snap.forEach(doc => {
            const d = doc.data();
            html += `<tr><td>${d.data}</td><td>${d.unidadeServe}</td><td>${d.posto}</td><td>${d.nome}</td><td>${d.rg}</td><td><button onclick="excluir('${doc.id}')">🗑️</button></td></tr>`;
            count++;
        });
        document.getElementById("tabelaBody").innerHTML = html;
        document.getElementById("total").innerText = count;
    }
    async function excluir(id) { if(confirm("Excluir?")) { await db.collection("agendamentos").doc(id).delete(); carregar(); } }
    function filtrar() { /* mesma lógica de filtro anterior */ }
    function baixarExcel() { /* mesma lógica de excel anterior */ }
    window.onload = carregar;
</script>
</body>
</html>
