<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM - Gestão Completa Dermatologia 2026</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --dermato-color: #fb8c00; --cba-blue: #0a2c6d; --cba-red: #d32f2f; --excel-green: #2e7d32; --polo-color: #0288d1; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        
        .header-adm { 
            background: white; padding: 20px; border-radius: 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-left: 8px solid var(--dermato-color); margin-bottom: 20px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
        }

        .card-destaque-geral {
            background: var(--cba-blue); color: white; padding: 20px; border-radius: 15px;
            text-align: center; box-shadow: 0 4px 15px rgba(10, 44, 109, 0.2); margin-bottom: 25px;
        }
        .card-destaque-geral h3 { margin: 0; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .card-destaque-geral p { margin: 5px 0 0; font-size: 3rem; font-weight: 900; }

        .section-title { 
            font-size: 0.85rem; font-weight: bold; color: #555; 
            text-transform: uppercase; margin: 20px 0 10px 5px; 
            display: flex; align-items: center; gap: 10px;
        }
        .section-title::after { content: ""; flex: 1; height: 1px; background: #ddd; }

        .grid-cards { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 15px; margin-bottom: 20px; 
        }
        
        .card-unidade { 
            background: white; padding: 15px; border-radius: 12px; text-align: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-bottom: 4px solid var(--dermato-color); 
        }
        .card-unidade h4 { font-size: 0.65rem; color: #888; text-transform: uppercase; margin: 0; min-height: 30px; }
        .card-unidade p { font-size: 1.8rem; font-weight: bold; color: var(--cba-blue); margin: 5px 0 0; }

        .card-polo { 
            background: white; padding: 15px; border-radius: 12px; text-align: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-bottom: 4px solid var(--polo-color); 
        }
        .card-polo h4 { font-size: 0.65rem; color: #888; text-transform: uppercase; margin: 0; min-height: 30px; }
        .card-polo p { font-size: 1.8rem; font-weight: bold; color: var(--polo-color); margin: 5px 0 0; }

        .search-box { background: white; padding: 15px; border-radius: 10px; display: flex; gap: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input#busca { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        
        .btn-excel { background: var(--excel-green); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-excel:hover { background: #1b5e20; }

        .table-container { background: white; border-radius: 10px; overflow-x: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background: #f8f9fa; padding: 15px; font-size: 11px; color: #777; text-align: left; border-bottom: 2px solid #eee; text-transform: uppercase; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; font-size: 13px; }
        .btn-del { background: #fff5f5; border: 1px solid #ffcdd2; color: var(--cba-red); padding: 5px 8px; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        .btn-del:hover { background: var(--cba-red); color: white; }
    </style>
</head>
<body>

<div class="header-adm">
    <div style="display: flex; align-items: center; gap: 15px;">
        <img src="https://raw.githubusercontent.com/gestaob6cbax/INSPECAO-MEDICA-CBA-X-2026/main/logo_cba_x.png" width="50">
        <div>
            <h2 style="margin:0; color:var(--cba-blue);">Painel ADM Dermatologia 2026</h2>
            <small style="color:#666;">CBA X - 6ª Seção (Gestão de Efetivo)</small>
        </div>
    </div>
    <button class="btn-excel" onclick="baixarRelatorio()">📥 EXPORTAR EXCEL</button>
</div>

<div class="card-destaque-geral">
    <h3>Total de Militares Agendados</h3>
    <p id="totalGeral">0</p>
</div>

<div class="section-title">Efetivo por Unidade de Origem</div>
<div id="gridUnidades" class="grid-cards"></div>

<div class="section-title">Efetivo por Polo de Atendimento (Local da Inspeção)</div>
<div id="gridPolos" class="grid-cards"></div>

<div class="search-box">
    <input type="text" id="busca" placeholder="🔍 Filtrar por Nome, RG, Unidade ou Polo..." oninput="filtrar()">
    <button onclick="carregarDados()" style="border:none; background:none; cursor:pointer; font-size:1.2rem;" title="Atualizar Lista">🔄</button>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>DATA</th>
                <th>UNIDADE ORIGEM</th>
                <th>POSTO</th>
                <th>NOME</th>
                <th>RG</th>
                <th>POLO</th>
                <th>AÇÕES</th>
            </tr>
        </thead>
        <tbody id="corpoTabela">
            <tr><td colspan="7" style="text-align:center;">Carregando dados...</td></tr>
        </tbody>
    </table>
</div>

<script>
    // Credenciais do Firebase
    const firebaseConfig = { 
        apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY", 
        authDomain: "inspecao-saude-cbax.firebaseapp.com", 
        projectId: "inspecao-saude-cbax", 
        storageBucket: "inspecao-saude-cbax.firebasestorage.app", 
        messagingSenderId: "1011281662526", 
        appId: "1:1011281662526:web:1028e8a8d140684e98376f" 
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let todosOsDados = [];

    // Função para carregar dados do Firebase
    async function carregarDados() {
        try {
            const snap = await db.collection("agendamentos_dermato").get();
            todosOsDados = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            // Ordena por data (mais recente primeiro)
            todosOsDados.sort((a, b) => b.data.localeCompare(a.data));
            
            renderizar(todosOsDados);
        } catch (error) {
            console.error("Erro:", error);
            document.getElementById("corpoTabela").innerHTML = "<tr><td colspan='7'>Erro ao carregar dados.</td></tr>";
        }
    }

    // Função para construir a tabela e os cards
    function renderizar(lista) {
        let html = "";
        let unidadesMap = {};
        let polosMap = {};

        lista.forEach(d => {
            // Contagem para os Cards
            let un = d.unidade || "N/I";
            unidadesMap[un] = (unidadesMap[un] || 0) + 1;

            let polo = d.local || "N/I";
            polosMap[polo] = (polosMap[polo] || 0) + 1;

            // Linha da Tabela
            html += `<tr>
                <td>${d.data}</td>
                <td><strong>${un}</strong></td>
                <td>${d.posto}</td>
                <td>${d.nome}</td>
                <td><code>${d.rg}</code></td>
                <td><small>${polo}</small></td>
                <td>
                    <button class="btn-del" onclick="excluir('${d.id}', '${d.nome}')" title="Excluir Agendamento">🗑️</button>
                </td>
            </tr>`;
        });

        document.getElementById("corpoTabela").innerHTML = html || "<tr><td colspan='7' style='text-align:center;'>Nenhum agendamento encontrado.</td></tr>";
        document.getElementById("totalGeral").innerText = lista.length;

        // Renderizar Cards Unidades
        let uniHtml = "";
        Object.keys(unidadesMap).sort().forEach(un => {
            uniHtml += `<div class="card-unidade"><h4>${un}</h4><p>${unidadesMap[un]}</p></div>`;
        });
        document.getElementById("gridUnidades").innerHTML = uniHtml;

        // Renderizar Cards Polos
        let polosHtml = "";
        Object.keys(polosMap).sort().forEach(p => {
            polosHtml += `<div class="card-polo"><h4>${p}</h4><p>${polosMap[p]}</p></div>`;
        });
        document.getElementById("gridPolos").innerHTML = polosHtml;
    }

    // Função de Busca em Tempo Real
    function filtrar() {
        const termo = document.getElementById("busca").value.toUpperCase();
        const filtrados = todosOsDados.filter(d => 
            (d.nome && d.nome.toUpperCase().includes(termo)) || 
            (d.rg && d.rg.includes(termo)) || 
            (d.unidade && d.unidade.toUpperCase().includes(termo)) ||
            (d.local && d.local.toUpperCase().includes(termo))
        );
        renderizar(filtrados);
    }

    // Função para Excluir Registro
    async function excluir(id, nome) {
        if(confirm(`ATENÇÃO: Deseja realmente excluir o agendamento de ${nome}?`)) {
            try {
                await db.collection("agendamentos_dermato").doc(id).delete();
                carregarDados();
            } catch (e) {
                alert("Erro ao excluir.");
            }
        }
    }

    // Função para Exportar para Excel
    function baixarRelatorio() {
        if(todosOsDados.length === 0) return alert("Sem dados para exportar.");
        
        // Formata os dados para o Excel ficar legível
        const dadosExcel = todosOsDados.map(d => ({
            'DATA DA INSPEÇÃO': d.data,
            'UNIDADE ORIGEM': d.unidade,
            'POSTO/GRAD': d.posto,
            'NOME COMPLETO': d.nome,
            'RG MILITAR': d.rg,
            'POLO DE ATENDIMENTO': d.local,
            'WHATSAPP': d.whatsapp,
            'E-MAIL': d.email,
            'DATA DO REGISTRO': d.dataHoraRegistro || 'N/I'
        }));

        const ws = XLSX.utils.json_to_sheet(dadosExcel);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Dermatologia 2026");
        XLSX.writeFile(wb, `RELATORIO_DERMATO_CBAX_${new Date().toLocaleDateString()}.xlsx`);
    }

    // Inicia o carregamento ao abrir a página
    window.onload = carregarDados;
</script>

</body>
</html>
