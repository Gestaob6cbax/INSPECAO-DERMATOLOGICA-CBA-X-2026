<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM - Gestão Dermatologia 2026</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        /* TEMA LARANJA CBA X */
        :root { 
            --cba-orange: #fb8c00; 
            --cba-orange-dark: #ef6c00;
            --cba-blue: #0a2c6d; 
            --bg-light: #fdf7f2;
        }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-light); margin: 0; padding: 20px; }
        
        .header-adm { 
            background: white; padding: 20px; border-radius: 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-left: 10px solid var(--cba-orange); margin-bottom: 20px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
        }

        .card-destaque-geral {
            background: var(--cba-orange); color: white; padding: 25px; border-radius: 15px;
            text-align: center; box-shadow: 0 6px 15px rgba(251, 140, 0, 0.3); margin-bottom: 25px;
        }
        .card-destaque-geral h3 { margin: 0; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .card-destaque-geral p { margin: 5px 0 0; font-size: 3.5rem; font-weight: 900; }

        .section-title { 
            font-size: 0.85rem; font-weight: bold; color: var(--cba-orange-dark); 
            text-transform: uppercase; margin: 25px 0 10px 5px; 
            display: flex; align-items: center; gap: 10px;
        }
        .section-title::after { content: ""; flex: 1; height: 2px; background: #ffe0b2; }

        .grid-cards { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 15px; margin-bottom: 20px; 
        }
        
        .card-count { 
            background: white; padding: 15px; border-radius: 12px; text-align: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-bottom: 4px solid var(--cba-orange); 
        }
        .card-count h4 { font-size: 0.65rem; color: #888; text-transform: uppercase; margin: 0; min-height: 30px; }
        .card-count p { font-size: 1.8rem; font-weight: bold; color: var(--cba-orange-dark); margin: 5px 0 0; }

        .search-box { background: white; padding: 15px; border-radius: 10px; display: flex; gap: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #ffe0b2; }
        input#busca { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 14px; }
        input#busca:focus { border-color: var(--cba-orange); }
        
        .btn-excel { background: #2e7d32; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-excel:hover { background: #1b5e20; transform: translateY(-2px); }

        .table-container { background: white; border-radius: 10px; overflow-x: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background: #fff8f1; padding: 15px; font-size: 11px; color: var(--cba-orange-dark); text-align: left; border-bottom: 2px solid #ffe0b2; text-transform: uppercase; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; font-size: 13px; color: #333; }
        tr:hover { background-color: #fffbf8; }
        
        .btn-del { background: #fff5f5; border: 1px solid #ffcdd2; color: #d32f2f; padding: 6px 10px; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        .btn-del:hover { background: #d32f2f; color: white; }

        code { background: #f4f4f4; padding: 2px 5px; border-radius: 4px; color: var(--cba-blue); font-weight: bold; }
    </style>
</head>
<body>

<div class="header-adm">
    <div style="display: flex; align-items: center; gap: 15px;">
        <img src="https://raw.githubusercontent.com/gestaob6cbax/INSPECAO-MEDICA-CBA-X-2026/main/logo_cba_x.png" width="55">
        <div>
            <h2 style="margin:0; color:var(--cba-orange-dark);">Painel ADM Dermatologia 2026</h2>
            <small style="color:var(--cba-blue); font-weight: bold;">CBA X - 6ª SEÇÃO</small>
        </div>
    </div>
    <button class="btn-excel" onclick="baixarRelatorio()">📥 EXPORTAR EXCEL</button>
</div>

<div class="card-destaque-geral">
    <h3>Total de Militares Agendados</h3>
    <p id="totalGeral">0</p>
</div>

<div class="section-title">Efetivo por Unidade de Origem</div>
<div id="gridUnidades" class="grid-cards"></div>

<div class="section-title">Efetivo por Local da Inspeção</div>
<div id="gridPolos" class="grid-cards"></div>

<div class="search-box">
    <input type="text" id="busca" placeholder="🔍 Filtrar por Nome, RG, Unidade ou Polo..." oninput="filtrar()">
    <button onclick="carregarDados()" style="border:none; background:none; cursor:pointer; font-size:1.4rem;" title="Atualizar Dados">🔄</button>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>DATA</th>
                <th>UNIDADE ORIGEM</th>
                <th>POSTO</th>
                <th>NOME COMPLETO</th>
                <th>RG MILITAR</th>
                <th>POLO DE ATENDIMENTO</th>
                <th>AÇÕES</th>
            </tr>
        </thead>
        <tbody id="corpoTabela">
            <tr><td colspan="7" style="text-align:center; padding: 40px;">Carregando agendamentos...</td></tr>
        </tbody>
    </table>
</div>

<script>
    // Configurações do Firebase
    const firebaseConfig = { 
        apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY", 
        authDomain: "inspecao-saude-cbax.firebaseapp.com", 
        projectId: "inspecao-saude-cbax", 
        storageBucket: "inspecao-saude-cbax.firebasestorage.app", 
        messagingSenderId: "1011281662526", 
        appId: "1:1011281662526:web:1028e8a8d140684e98376f" 
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let todosOsDados = [];

    async function carregarDados() {
        try {
            const snap = await db.collection("agendamentos_dermato").get();
            todosOsDados = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            // Ordenar por data (mais recente no topo)
            todosOsDados.sort((a, b) => b.data.localeCompare(a.data));
            
            renderizar(todosOsDados);
        } catch (error) {
            console.error(error);
            document.getElementById("corpoTabela").innerHTML = "<tr><td colspan='7' style='color:red; text-align:center;'>Erro ao carregar dados do Firebase.</td></tr>";
        }
    }

    function renderizar(lista) {
        let html = "";
        let unidadesMap = {};
        let polosMap = {};

        lista.forEach(d => {
            // Contabilização para os Cards (Laranja)
            let un = d.unidade || "N/I";
            unidadesMap[un] = (unidadesMap[un] || 0) + 1;

            let polo = d.local || "N/I";
            polosMap[polo] = (polosMap[polo] || 0) + 1;

            html += `<tr>
                <td><b>${d.data}</b></td>
                <td>${un}</td>
                <td>${d.posto}</td>
                <td style="text-transform: uppercase;">${d.nome}</td>
                <td><code>${d.rg}</code></td>
                <td><small>${polo}</small></td>
                <td>
                    <button class="btn-del" onclick="excluir('${d.id}', '${d.nome}')">🗑️</button>
                </td>
            </tr>`;
        });

        document.getElementById("corpoTabela").innerHTML = html || "<tr><td colspan='7' style='text-align:center;'>Nenhum registro encontrado.</td></tr>";
        document.getElementById("totalGeral").innerText = lista.length;

        // Gerar Cards de Unidades
        let uniHtml = "";
        Object.keys(unidadesMap).sort().forEach(un => {
            uniHtml += `<div class="card-count"><h4>${un}</h4><p>${unidadesMap[un]}</p></div>`;
        });
        document.getElementById("gridUnidades").innerHTML = uniHtml;

        // Gerar Cards de Polos
        let polosHtml = "";
        Object.keys(polosMap).sort().forEach(p => {
            polosHtml += `<div class="card-count"><h4>${p}</h4><p>${polosMap[p]}</p></div>`;
        });
        document.getElementById("gridPolos").innerHTML = polosHtml;
    }

    function filtrar() {
        const termo = document.getElementById("busca").value.toUpperCase();
        const filtrados = todosOsDados.filter(d => 
            (d.nome && d.nome.toUpperCase().includes(termo)) || 
            (d.rg && d.rg.includes(termo)) || 
            (d.unidade && d.unidade.toUpperCase().includes(termo)) ||
            (d.local && d.local.toUpperCase().includes(termo))
        );
        renderizar(filtrados);
    }

    async function excluir(id, nome) {
        if(confirm(`Deseja excluir o agendamento de ${nome}?`)) {
            await db.collection("agendamentos_dermato").doc(id).delete();
            carregarDados();
        }
    }

    function baixarRelatorio() {
        if(todosOsDados.length === 0) return alert("Sem dados.");
        const dadosLimpos = todosOsDados.map(({id, ...resto}) => resto);
        const ws = XLSX.utils.json_to_sheet(dadosLimpos);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Dermato_2026");
        XLSX.writeFile(wb, "RELATORIO_DERMATO_CBAX.xlsx");
    }

    window.onload = carregarDados;
</script>

</body>
</html>
