<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ADM - Gestão Completa Dermatologia 2026</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --dermato-color: #fb8c00; --cba-blue: #0a2c6d; --cba-red: #d32f2f; --excel-green: #2e7d32; --polo-color: #0288d1; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        
        .header-adm { 
            background: white; padding: 20px; border-radius: 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-left: 8px solid var(--dermato-color); margin-bottom: 20px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
        }

        /* CARD DESTAQUE: TOTAL GERAL */
        .card-destaque-geral {
            background: var(--cba-blue); color: white; padding: 20px; border-radius: 15px;
            text-align: center; box-shadow: 0 4px 15px rgba(10, 44, 109, 0.2); margin-bottom: 25px;
        }
        .card-destaque-geral h3 { margin: 0; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .card-destaque-geral p { margin: 5px 0 0; font-size: 3rem; font-weight: 900; }

        .section-title { 
            font-size: 0.85rem; font-weight: bold; color: #555; 
            text-transform: uppercase; margin: 20px 0 10px 5px; 
            display: flex; align-items: center; gap: 10px;
        }
        .section-title::after { content: ""; flex: 1; height: 1px; background: #ddd; }

        /* GRIDS */
        .grid-cards { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 15px; margin-bottom: 20px; 
        }
        
        /* Estilo Unidades de Origem */
        .card-unidade { 
            background: white; padding: 15px; border-radius: 12px; text-align: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-bottom: 4px solid var(--dermato-color); 
        }
        .card-unidade h4 { font-size: 0.65rem; color: #888; text-transform: uppercase; margin: 0; min-height: 30px; }
        .card-unidade p { font-size: 1.8rem; font-weight: bold; color: var(--cba-blue); margin: 5px 0 0; }

        /* Estilo Polos de Atendimento */
        .card-polo { 
            background: white; padding: 15px; border-radius: 12px; text-align: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-bottom: 4px solid var(--polo-color); 
        }
        .card-polo h4 { font-size: 0.65rem; color: #888; text-transform: uppercase; margin: 0; min-height: 30px; }
        .card-polo p { font-size: 1.8rem; font-weight: bold; color: var(--polo-color); margin: 5px 0 0; }

        /* BUSCA E TABELA */
        .search-box { background: white; padding: 15px; border-radius: 10px; display: flex; gap: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input#busca { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        
        .btn-excel { background: var(--excel-green); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .table-container { background: white; border-radius: 10px; overflow-x: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background: #f8f9fa; padding: 15px; font-size: 11px; color: #777; text-align: left; border-bottom: 2px solid #eee; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; font-size: 13px; }
        .btn-del { background: #fff5f5; border: 1px solid #ffcdd2; color: var(--cba-red); padding: 5px 8px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header-adm">
    <div style="display: flex; align-items: center; gap: 15px;">
        <img src="https://raw.githubusercontent.com/gestaob6cbax/INSPECAO-MEDICA-CBA-X-2026/main/logo_cba_x.png" width="50">
        <h2>Painel ADM Dermatologia 2026</h2>
    </div>
    <button class="btn-excel" onclick="baixarRelatorio()">📥 EXPORTAR EXCEL</button>
</div>

<div class="card-destaque-geral">
    <h3>Total de Militares Agendados</h3>
    <p id="totalGeral">0</p>
</div>

<div class="section-title">Efetivo por Unidade de Origem</div>
<div id="gridUnidades" class="grid-cards"></div>

<div class="section-title">Efetivo por Polo de Atendimento</div>
<div id="gridPolos" class="grid-cards"></div>

<div class="search-box">
    <input type="text" id="busca" placeholder="🔍 Filtrar lista de militares..." oninput="filtrar()">
    <button onclick="carregarDados()" style="border:none; background:none; cursor:pointer;">🔄</button>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>DATA</th><th>UNIDADE ORIGEM</th><th>POSTO</th><th>NOME</th><th>RG</th><th>POLO</th><th>AÇÕES</th>
            </tr>
        </thead>
        <tbody id="corpoTabela"></tbody>
    </table>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY", 
        authDomain: "inspecao-saude-cbax.firebaseapp.com", 
        projectId: "inspecao-saude-cbax", 
        storageBucket: "inspecao-saude-cbax.firebasestorage.app", 
        messagingSenderId: "1011281662526", 
        appId: "1:1011281662526:web:1028e8a8d140684e98376f" 
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let todosOsDados = [];

    async function carregarDados() {
        const snap = await db.collection("agendamentos_dermato").orderBy("timestamp", "desc").get();
        todosOsDados = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderizar(todosOsDados);
    }

    function renderizar(lista) {
        let html = "";
        let unidadesMap = {};
        let polosMap = {};

        lista.forEach(d => {
            // Contagem Unidades
            let un = d.unidadeOrigem || "N/I";
            unidadesMap[un] = (unidadesMap[un] || 0) + 1;

            // Contagem Polos
            let polo = d.localTexto || "N/I";
            polosMap[polo] = (polosMap[polo] || 0) + 1;

            html += `<tr>
                <td>${d.data}</td>
                <td><strong>${d.unidadeOrigem}</strong></td>
                <td>${d.posto}</td>
                <td>${d.nome}</td>
                <td><code>${d.rg}</code></td>
                <td><small>${d.localTexto}</small></td>
                <td><button class="btn-del" onclick="excluir('${d.id}')">🗑️</button></td>
            </tr>`;
        });

        document.getElementById("corpoTabela").innerHTML = html;
        document.getElementById("totalGeral").innerText = lista.length;

        // Renderizar Cards Unidades (Laranja)
        let uniHtml = "";
        Object.keys(unidadesMap).sort().forEach(un => {
            uniHtml += `<div class="card-unidade"><h4>${un}</h4><p>${unidadesMap[un]}</p></div>`;
        });
        document.getElementById("gridUnidades").innerHTML = uniHtml;

        // Renderizar Cards Polos (Azul)
        let polosHtml = "";
        Object.keys(polosMap).sort().forEach(p => {
            polosHtml += `<div class="card-polo"><h4>${p}</h4><p>${polosMap[p]}</p></div>`;
        });
        document.getElementById("gridPolos").innerHTML = polosHtml;
    }

    function filtrar() {
        const termo = document.getElementById("busca").value.toUpperCase();
        const filtrados = todosOsDados.filter(d => 
            d.nome.toUpperCase().includes(termo) || d.rg.includes(termo) || d.unidadeOrigem.toUpperCase().includes(termo)
        );
        renderizar(filtrados);
    }

    async function excluir(id) {
        if(confirm("Excluir registro?")) {
            await db.collection("agendamentos_dermato").doc(id).delete();
            carregarDados();
        }
    }

    function baixarRelatorio() {
        const ws = XLSX.utils.json_to_sheet(todosOsDados);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Dermatologia");
        XLSX.writeFile(wb, "RELATORIO_COMPLETO_DERMATO.xlsx");
    }

    window.onload = carregarDados;
</script>
</body>
</html>
