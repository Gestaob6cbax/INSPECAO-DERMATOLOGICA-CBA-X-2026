<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ADM - Dermatologia 2026 - CBA X</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --dermato-color: #fb8c00; --cba-blue: #0a2c6d; --cba-red: #d32f2f; --excel-green: #2e7d32; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        
        .header-adm { 
            background: white; padding: 20px; border-radius: 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-left: 8px solid var(--dermato-color); margin-bottom: 20px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
        }
        
        .header-info { display: flex; align-items: center; gap: 15px; }
        .header-info h2 { margin: 0; color: var(--cba-blue); font-size: 1.2rem; text-transform: uppercase; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn-relatorio { background: var(--excel-green); color: white; padding: 10px 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-reset { background: var(--cba-red); color: white; padding: 10px 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }

        .stats-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-bottom: 3px solid #ddd; }
        .stat-card h3 { font-size: 0.7rem; color: #888; text-transform: uppercase; margin: 0; }
        .stat-card p { font-size: 2.2rem; font-weight: bold; color: var(--cba-blue); margin: 10px 0 0; }

        .search-box { background: white; padding: 15px; border-radius: 10px; display: flex; gap: 10px; margin-bottom: 15px; align-items: center; }
        input#busca { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .btn-atualizar { background: var(--cba-blue); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .table-container { background: white; border-radius: 10px; overflow-x: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background: #f8f9fa; padding: 12px; font-size: 11px; color: #777; text-align: left; border-bottom: 2px solid #eee; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; color: #333; }
        tr:hover { background: #f9f9f9; }
        
        .btn-del { background: #fff5f5; border: 1px solid #ffcdd2; cursor: pointer; color: var(--cba-red); padding: 5px 8px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="header-adm">
    <div class="header-info">
        <img src="https://raw.githubusercontent.com/gestaob6cbax/INSPECAO-MEDICA-CBA-X-2026/main/logo_cba_x.png" width="55">
        <div>
            <h2>Painel Gestão Dermatológica 2026</h2>
            <p style="margin:0; font-size: 0.7rem; color: #888; font-weight: bold;">CBA X - 6ª SEÇÃO</p>
        </div>
    </div>
    <div class="btn-group">
        <button class="btn-relatorio" onclick="baixarRelatorio()">📥 Gerar Planilha Excel</button>
        <button class="btn-reset" onclick="resetarSistema()">⚠️ Limpar Banco</button>
    </div>
</div>

<div class="stats-container">
    <div class="stat-card"><h3>Total de Inscritos</h3><p id="total">0</p></div>
    <div class="stat-card" style="border-bottom-color: var(--dermato-color);"><h3>Polo Recreio</h3><p id="totalRecreio">0</p></div>
    <div class="stat-card" style="border-bottom-color: var(--cba-blue);"><h3>Outros Polos</h3><p id="totalOutros">0</p></div>
</div>

<div class="search-box">
    <input type="text" id="busca" placeholder="🔍 Pesquisar por Nome, RG ou Unidade..." oninput="filtrar()">
    <button class="btn-atualizar" onclick="carregarDados()">🔄 Atualizar Lista</button>
</div>

<div class="table-container">
    <table id="tabelaADM">
        <thead>
            <tr>
                <th>DATA</th>
                <th>UNIDADE</th>
                <th>POLO ATENDIMENTO</th>
                <th>POSTO</th>
                <th>NOME COMPLETO</th>
                <th>RG MILITAR</th>
                <th>CONTATO</th>
                <th style="text-align:center;">AÇÃO</th>
            </tr>
        </thead>
        <tbody id="corpoTabela">
            <tr><td colspan="8" style="text-align:center; padding:30px;">Buscando agendamentos...</td></tr>
        </tbody>
    </table>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY", 
        authDomain: "inspecao-saude-cbax.firebaseapp.com", 
        projectId: "inspecao-saude-cbax", 
        storageBucket: "inspecao-saude-cbax.firebasestorage.app", 
        messagingSenderId: "1011281662526", 
        appId: "1:1011281662526:web:1028e8a8d140684e98376f" 
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let todosOsDados = [];

    async function carregarDados() {
        try {
            const snap = await db.collection("agendamentos_dermato").get();
            todosOsDados = [];
            snap.forEach(doc => todosOsDados.push({ id: doc.id, ...doc.data() }));
            
            // Ordenação automática por data
            todosOsDados.sort((a,b) => a.data.split('/').reverse().join('').localeCompare(b.data.split('/').reverse().join('')));
            
            renderizar(todosOsDados);
        } catch (e) {
            document.getElementById("corpoTabela").innerHTML = "<tr><td colspan='8' style='color:red; text-align:center;'>Erro ao conectar com o banco.</td></tr>";
        }
    }

    function renderizar(lista) {
        let html = "";
        let countRecreio = 0;

        lista.forEach(d => {
            if(d.local === "RECREIO") countRecreio++;
            
            html += `<tr>
                <td><strong>${d.data}</strong></td>
                <td><small>${d.unidadeOrigem || '-'}</small></td>
                <td><span style="color:var(--dermato-color); font-weight:bold;">${d.localTexto || d.local}</span></td>
                <td>${d.posto}</td>
                <td><strong>${d.nome}</strong></td>
                <td><code>${d.rg}</code></td>
                <td><small>${d.telefone || '-'}</small></td>
                <td style="text-align:center;"><button class="btn-del" onclick="excluir('${d.id}')">🗑️</button></td>
            </tr>`;
        });

        document.getElementById("corpoTabela").innerHTML = html || "<tr><td colspan='8' style='text-align:center;'>Nenhum agendamento realizado até o momento.</td></tr>";
        document.getElementById("total").innerText = lista.length;
        document.getElementById("totalRecreio").innerText = countRecreio;
        document.getElementById("totalOutros").innerText = lista.length - countRecreio;
    }

    function filtrar() {
        const termo = document.getElementById("busca").value.toUpperCase();
        const filtrados = todosOsDados.filter(d => 
            d.nome.toUpperCase().includes(termo) || 
            d.rg.includes(termo) || 
            (d.unidadeOrigem && d.unidadeOrigem.toUpperCase().includes(termo))
        );
        renderizar(filtrados);
    }

    async function excluir(id) {
        if(confirm("Deseja realmente remover este agendamento?")) {
            await db.collection("agendamentos_dermato").doc(id).delete();
            carregarDados();
        }
    }

    async function resetarSistema() {
        if(confirm("🚨 AVISO: Isso apagará TODOS os dados de dermatologia. Confirma?")) {
            const snap = await db.collection("agendamentos_dermato").get();
            const batch = db.batch();
            snap.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
            carregarDados();
        }
    }

    function baixarRelatorio() {
        if(todosOsDados.length === 0) return alert("Não há dados para exportar.");
        
        const ws = XLSX.utils.json_to_sheet(todosOsDados.map(d => ({
            DATA_AGENDADA: d.data,
            POSTO_GRAD: d.posto,
            NOME_COMPLETO: d.nome,
            RG: d.rg,
            UNIDADE: d.unidadeOrigem,
            POLO: d.localTexto,
            TELEFONE: d.telefone,
            EMAIL: d.email
        })));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Agendamentos_Dermato");
        XLSX.writeFile(wb, "RELATORIO_DERMATO_CBAX_2026.xlsx");
    }

    window.onload = carregarDados;
</script>
</body>
</html>
