<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ADM - DERMATOLOGIA 2026 - CBA X</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
        :root { --cba-orange: #fb8c00; --cba-blue: #0a2c6d; --danger: #d32f2f; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        
        header { 
            background: var(--cba-blue); 
            color: white; 
            padding: 20px; 
            border-radius: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 5px solid var(--cba-orange);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .stats-box {
            background: rgba(255,255,255,0.15);
            padding: 10px 20px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .controls { 
            background: white; 
            padding: 15px; 
            border-radius: 12px; 
            margin: 20px 0; 
            display: flex; 
            gap: 10px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        input#lupa { flex-grow: 1; padding: 12px; border: 2px solid #eee; border-radius: 8px; font-size: 14px; }
        
        button { padding: 12px 18px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-excel { background: #2e7d32; color: white; }
        .btn-refresh { background: var(--cba-blue); color: white; }
        .btn-clear { background: #eee; color: #666; }

        .table-container { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 15px; text-align: left; font-size: 11px; text-transform: uppercase; color: #888; border-bottom: 2px solid #eee; }
        td { padding: 12px 15px; border-bottom: 1px solid #f1f1f1; font-size: 13px; color: #333; }
        tr:hover { background-color: #fff9f4; }

        .btn-excluir { color: var(--danger); background: none; border: 1px solid #ffcdd2; padding: 5px 8px; border-radius: 5px; font-size: 12px; }
        .btn-excluir:hover { background: #ffebee; }
    </style>
</head>
<body>

<header>
    <div>
        <h1 style="margin:0; font-size: 1.4rem; text-transform: uppercase;">Controle Dermatologia 2026</h1>
        <p style="margin:0; font-size: 0.8rem; opacity: 0.8;">Gestão de Efetivo - CBA X</p>
    </div>
    <div class="stats-box">
        <span style="font-size: 10px; display: block; font-weight: bold;">TOTAL AGENDADO</span>
        <strong id="total" style="font-size: 24px;">0</strong>
    </div>
</header>

<div class="controls">
    <input type="text" id="lupa" placeholder="🔍 Filtrar por Nome, RG, Unidade ou Data..." onkeyup="filtrar()">
    <button class="btn-refresh" onclick="carregar()">🔄 Atualizar</button>
    <button class="btn-excel" onclick="baixarExcel()">📥 EXCEL</button>
    <button class="btn-clear" onclick="resetarTudo()">⚠️ LIMPAR</button>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>Data</th>
                <th>Unidade Lotação</th>
                <th>Posto</th>
                <th>Nome Completo</th>
                <th>RG</th>
                <th>Contato</th>
                <th style="text-align:center;">Ações</th>
            </tr>
        </thead>
        <tbody id="tabelaBody">
            <tr><td colspan="7" style="text-align:center; padding:30px;">Sincronizando com Firebase...</td></tr>
        </tbody>
    </table>
</div>

<script>
    // Mesmo Firebase do seu Index
    const firebaseConfig = {
        apiKey: "AIzaSyDDWZDSNvsXyKDl0T54ROn_pOUSUGheQZw",
        authDomain: "inspecao-dermatologia-cbax.firebaseapp.com",
        projectId: "inspecao-dermatologia-cbax",
        storageBucket: "inspecao-dermatologia-cbax.firebasestorage.app",
        messagingSenderId: "513142138310",
        appId: "1:513142138310:web:74cb653c48f574541dfec7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function carregar() {
        const corpo = document.getElementById("tabelaBody");
        const totalTxt = document.getElementById("total");
        
        try {
            const snap = await db.collection("agendamentos").get();
            let lista = [];
            snap.forEach(doc => lista.push({id: doc.id, ...doc.data()}));
            
            // Ordenar por data
            lista.sort((a,b) => a.data.split('/').reverse().join('').localeCompare(b.data.split('/').reverse().join('')));

            let html = "";
            lista.forEach(d => {
                html += `<tr>
                    <td><strong>${d.data}</strong></td>
                    <td><small>${d.unidadeServe}</small></td>
                    <td>${d.posto}</td>
                    <td>${d.nome}</td>
                    <td><code>${d.rg}</code></td>
                    <td><small>${d.telefone}<br>${d.email}</small></td>
                    <td style="text-align:center;">
                        <button class="btn-excluir" onclick="excluirIndividual('${d.id}')">🗑️</button>
                    </td>
                </tr>`;
            });

            corpo.innerHTML = html || "<tr><td colspan='7' style='text-align:center;'>Nenhum registro encontrado.</td></tr>";
            totalTxt.innerText = lista.length;

        } catch (e) {
            corpo.innerHTML = "<tr><td colspan='7' style='color:red; text-align:center;'>Erro ao carregar dados.</td></tr>";
        }
    }

    async function excluirIndividual(id) {
        if(confirm("Confirmar exclusão deste registro?")) {
            await db.collection("agendamentos").doc(id).delete();
            carregar();
        }
    }

    async function resetarTudo() {
        if(confirm("🚨 PERIGO: Deseja apagar TODOS os registros de Dermatologia? Esta ação não pode ser desfeita.")) {
            const snap = await db.collection("agendamentos").get();
            const batch = db.batch();
            snap.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
            alert("Banco de dados reiniciado.");
            carregar();
        }
    }

    function filtrar() {
        const b = document.getElementById("lupa").value.toUpperCase();
        document.querySelectorAll("#tabelaBody tr").forEach(r => {
            r.style.display = r.innerText.toUpperCase().includes(b) ? "" : "none";
        });
    }

    function baixarExcel() {
        let csv = "Data;Unidade;Posto;Nome;RG;Telefone;Email\n";
        document.querySelectorAll("#tabelaBody tr").forEach(r => {
            const c = r.querySelectorAll("td");
            if(c.length > 1) {
                // Remove quebras de linha do contato para não quebrar o CSV
                let contato = c[5].innerText.replace(/\n/g, " | ");
                csv += `${c[0].innerText};${c[1].innerText};${c[2].innerText};${c[3].innerText};${c[4].innerText};${contato}\n`;
            }
        });
        const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "relatorio_dermato_2026.csv";
        link.click();
    }

    window.onload = carregar;
</script>
</body>
</html>
