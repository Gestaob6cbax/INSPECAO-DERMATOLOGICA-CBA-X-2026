<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel ADM - Dermato</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        
        /* HEADER IGUAL AO PRINT */
        .header-adm { background: white; padding: 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 8px solid #d32f2f; margin-bottom: 20px; }
        .header-info { display: flex; align-items: center; gap: 15px; }
        .header-info h2 { margin: 0; color: #0a2c6d; font-size: 1.2rem; }
        .btn-group { display: flex; gap: 10px; }
        .btn-relatorio { background: #2ecc71; color: white; padding: 10px 15px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; }
        .btn-reset { background: #d32f2f; color: white; padding: 10px 15px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; }

        /* CARDS DE TOTALIZADORES */
        .stats-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .stat-card h3 { font-size: 0.7rem; color: #888; text-transform: uppercase; margin: 0; }
        .stat-card p { font-size: 2rem; font-weight: bold; color: #0a2c6d; margin: 10px 0 0; }

        /* PESQUISA E TABELA */
        .search-box { background: white; padding: 15px; border-radius: 10px; display: flex; gap: 10px; margin-bottom: 10px; }
        input#busca { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .btn-atualizar { background: #0a2c6d; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        
        table { width: 100%; background: white; border-collapse: collapse; border-radius: 10px; overflow: hidden; }
        th { background: #f8f9fa; padding: 12px; font-size: 0.7rem; color: #999; text-align: left; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="header-adm">
    <div class="header-info">
        <img src="https://raw.githubusercontent.com/gestaob6cbax/INSPECAO-MEDICA-CBA-X-2026/main/logo_cba_x.png" width="50">
        <div>
            <h2>Gestão de Inspeção Dermatológica</h2>
            <p style="margin:0; font-size: 0.7rem; color: #888;">COMANDO DE BOMBEIROS DE ÁREA X - 2026</p>
        </div>
    </div>
    <div class="btn-group">
        <button class="btn-relatorio">📥 Baixar Relatório</button>
        <button class="btn-reset" onclick="resetarSistema()">⚠️ Resetar Sistema</button>
    </div>
</div>

<div class="stats-container">
    <div class="stat-card"><h3>Total Agendados</h3><p id="total">0</p></div>
    <div class="stat-card"><h3>Turno Manhã</h3><p>--</p></div>
    <div class="stat-card"><h3>Turno Tarde</h3><p>--</p></div>
</div>

<div class="search-box">
    <input type="text" id="busca" placeholder="Pesquise por Nome, RG ou Unidade..." onkeyup="filtrar()">
    <button class="btn-atualizar" onclick="carregarDados()">🔄 Atualizar</button>
</div>

<table>
    <thead>
        <tr>
            <th>DATA</th><th>ORIGEM</th><th>POSTO</th><th>NOME COMPLETO</th><th>RG</th><th>TELEFONE</th><th>AÇÕES</th>
        </tr>
    </thead>
    <tbody id="corpoTabela"></tbody>
</table>

<script>
    // Configurações do Firebase (mantenha a sua aqui)
    const firebaseConfig = { apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY", authDomain: "inspecao-saude-cbax.firebaseapp.com", projectId: "inspecao-saude-cbax", storageBucket: "inspecao-saude-cbax.firebasestorage.app", messagingSenderId: "1011281662526", appId: "1:1011281662526:web:1028e8a8d140684e98376f" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function carregarDados() {
        const snap = await db.collection("agendamentos_dermato").get();
        let html = "";
        snap.forEach(doc => {
            const d = doc.data();
            html += `<tr>
                <td>${d.data}</td><td>${d.unidadeServe || 'CBA X'}</td><td>${d.posto}</td><td>${d.nome}</td>
                <td>${d.rg}</td><td>${d.telefone || '-'}</td>
                <td><button onclick="excluir('${doc.id}')">🗑️</button></td>
            </tr>`;
        });
        document.getElementById("corpoTabela").innerHTML = html;
        document.getElementById("total").innerText = snap.size;
    }

    async function excluir(id) {
        if(confirm("Excluir?")) {
            await db.collection("agendamentos_dermato").doc(id).delete();
            carregarDados();
        }
    }

    async function resetarSistema() {
        if(confirm("ATENÇÃO: Isso apagará TODOS os agendamentos. Confirma?")) {
            const snap = await db.collection("agendamentos_dermato").get();
            const batch = db.batch();
            snap.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
            carregarDados();
        }
    }

    window.onload = carregarDados;
</script>
</body>
</html>
