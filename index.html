<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento Dermatológico 2026 - CBA X</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f4; padding: 20px; }
        .card { background: white; max-width: 600px; margin: auto; padding: 25px; border-radius: 15px; border-top: 10px solid #d2691e; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* Centralização e Tamanho da Logo */
        .logo-container { display: flex; justify-content: center; margin-bottom: 10px; }
        .logo { width: 120px; height: auto; } /* Tamanho reduzido e proporcional */

        h2 { text-align: center; color: #333; margin-bottom: 5px; }
        p.subtitulo { text-align: center; font-size: 14px; color: #666; margin-bottom: 25px; }
        
        label { font-weight: bold; font-size: 14px; color: #444; display: block; margin-top: 15px; }
        input, select, button { width: 100%; padding: 12px; margin-top: 8px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        
        button { background: #d2691e; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 25px; transition: 0.3s; }
        button:hover { background: #a0522d; }
        
        .vagas-info { background: #fff3cd; padding: 12px; border-radius: 8px; font-size: 14px; margin-top: 15px; display: flex; justify-content: space-between; border: 1px solid #ffeeba; }
        hr { margin: 25px 0; border: 0; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-container">
        <img src="logo_cba_x.png" alt="Logo CBA X" class="logo" />
    </div>
    
    <h2>Inspeção Dermatológica 2026</h2>
    <p class="subtitulo">CBA X - Comando de Bombeiros de Área</p>

    <form id="formDermato">
        <label>Dados Pessoais</label>
        <input type="text" id="nome" placeholder="Nome Completo" required>
        <input type="text" id="rg" placeholder="RG Militar (Apenas números)" required pattern="\d+">
        
        <select id="graduacao" required>
            <option value="">Posto ou Graduação...</option>
            <option>SD BM</option><option>CB BM</option><option>3º SGT BM</option>
            <option>2º SGT BM</option><option>1º SGT BM</option><option>SUBTEN BM</option>
            <option>2º TEN BM</option><option>1º TEN BM</option><option>CAP BM</option>
            <option>MAJ BM</option><option>TEN CEL BM</option><option>CEL BM</option>
        </select>

        <input type="email" id="email" placeholder="E-mail funcional ou pessoal" required>
        <input type="tel" id="telefone" placeholder="Telefone (WhatsApp)" required>
        
        <select id="unidadeServe" required>
            <option value="">Unidade onde serve...</option>
            <option>1º GMar - Botafogo</option>
            <option>DBM 1/M - Paquetá</option>
            <option>DBM 2/M - Piscinão de Ramos</option>
            <option>CER</option>
            <option>2º GMar - Barra da Tijuca</option>
            <option>3º GMar - Copacabana</option>
            <option>4º GMar - Itaipu</option>
            <option>DBM 6/M - Itaipu</option>
            <option>CBA X</option>
            <option>DBM 3/M - Recreio dos Bandeirantes</option>
            <option>DBM 4/M - Barra de Guaratiba</option>
            <option>DBM 5/M - Sepetiba</option>
        </select>

        <hr>

      <label>Local e Data da Inspeção:</label>
<select id="dataLocal" onchange="atualizarInterfaceVagas()" required>
    <option value="">Selecione o local e data...</option>
    
    <optgroup label="CER BARRA (CBA X, CER, 2º GMAR, GBS)">
        <option value="07/04/2026|CER Barra" data-max="83">07/04/2026 - CER Barra</option>
        <option value="14/04/2026|CER Barra" data-max="83">14/04/2026 - CER Barra</option>
        <option value="28/04/2026|CER Barra" data-max="83">28/04/2026 - CER Barra</option>
    </optgroup>

    <optgroup label="3º GMAR - COPACABANA">
        <option value="09/04/2026|3º GMAR Copa" data-max="77">09/04/2026 - 3º GMAR</option>
        <option value="05/05/2026|3º GMAR Copa" data-max="77">05/05/2026 - 3º GMAR</option>
    </optgroup>

    <optgroup label="4º GMAR - ITAIPU">
        <option value="12/05/2026|4º GMAR Itaipu" data-max="55">12/05/2026 - 4º GMAR</option>
        <option value="07/07/2026|4º GMAR Itaipu" data-max="55">07/07/2026 - 4º GMAR</option>
    </optgroup>

    <optgroup label="1º GMAR - BOTAFOGO">
        <option value="11/06/2026|1º GMAR Botafogo" data-max="65">11/06/2026 - 1º GMAR</option>
        <option value="02/07/2026|1º GMAR Botafogo" data-max="65">02/07/2026 - 1º GMAR</option>
    </optgroup>

    <optgroup label="DBM 3/M - RECREIO">
        <option value="06/07/2026|DBM Recreio" data-max="85">06/07/2026 - DBM 3/M</option>
        <option value="20/07/2026|DBM Recreio" data-max="85">20/07/2026 - DBM 3/M</option>
    </optgroup>
</select>
        <div id="displayVagas" class="vagas-info" style="display:none">
            <span>Vagas Totais nesta data: <b id="vagasTotal">--</b></span>
            <span>Disponíveis: <b id="numVagas" style="color:green">--</b></span>
        </div>

        <select id="horario" required>
            <option value="">Selecione o turno de chegada...</option>
            <option value="08:00 às 09:00">08:00 às 09:00</option>
            <option value="09:00 às 10:00">09:00 às 10:00</option>
            <option value="10:00 às 11:00">10:00 às 11:00</option>
            <option value="11:00 às 12:00">11:00 às 12:00</option>
            <option value="13:00 às 14:00">13:00 às 14:00</option>
            <option value="14:00 às 15:00">14:00 às 15:00</option>
            <option value="15:00 às 16:00">15:00 às 16:00</option>
            <option value="16:00 às 17:00">16:00 às 17:00</option>
        </select>

        <button type="submit" id="btnFinalizar">Finalizar Agendamento e Gerar PDF</button>
    </form>
</div>

<script>
    // CONFIGURAÇÃO DO FIREBASE (Cole suas chaves aqui)
    const firebaseConfig = {
        apiKey: "SUA_API_KEY",
        authDomain: "SEU_PROJETO.firebaseapp.com",
        projectId: "SEU_PROJETO",
        storageBucket: "SEU_PROJETO.appspot.com",
        messagingSenderId: "ID_SENDER",
        appId: "ID_APP"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Função para mostrar vagas (Lógica Visual)
    function atualizarInterfaceVagas() {
        const select = document.getElementById('dataLocal');
        const maxVagas = select.options[select.selectedIndex].getAttribute('data-max');
        
        if(maxVagas) {
            document.getElementById('displayVagas').style.display = 'flex';
            document.getElementById('vagasTotal').innerText = maxVagas;
            document.getElementById('numVagas').innerText = "Consultando...";
            // Aqui você chamaria a função para contar no Firebase
        } else {
            document.getElementById('displayVagas').style.display = 'none';
        }
    }

    // Envio do Formulário
    document.getElementById('formDermato').onsubmit = async function(e) {
        e.preventDefault();
        const rg = document.getElementById('rg').value;

        // Bloqueio de RG Único
        const docRef = db.collection("agendamentos_dermato").doc(rg);
        const docSnap = await docRef.get();

        if (docSnap.exists) {
            alert("⚠️ Erro: Este RG já possui um agendamento realizado!");
            return;
        }

        // Salvar no Firebase
        const dados = {
            nome: document.getElementById('nome').value,
            rg: rg,
            graduacao: document.getElementById('graduacao').value,
            email: document.getElementById('email').value,
            telefone: document.getElementById('telefone').value,
            unidadeServe: document.getElementById('unidadeServe').value,
            dataLocal: document.getElementById('dataLocal').value,
            horario: document.getElementById('horario').value,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        try {
            await docRef.set(dados);
            gerarPDF(dados);
            alert("✅ Agendamento realizado com sucesso! Seu PDF será gerado.");
            document.getElementById('formDermato').reset();
        } catch (error) {
            console.error("Erro ao salvar:", error);
            alert("Erro ao salvar agendamento.");
        }
    };

    function gerarPDF(dados) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const [data, local] = dados.dataLocal.split('|');

    // Lógica simples para definir a médica no PDF com base no local
    let medica = "";
    if (local.includes("CER Barra")) medica = "Dra. Ana Cristina";
    else if (local.includes("3º GMAR") || local.includes("1º GMAR")) medica = "Dra. Gabriella Correa";
    else if (local.includes("4º GMAR")) medica = "Dra. Marien de Lima";
    else if (local.includes("DBM Recreio")) medica = "Dra. Mara Diane";

    doc.setFontSize(18);
    doc.text("Comprovante de Agendamento - Dermatologia", 20, 20);
    
    doc.setFontSize(12);
    doc.text(`Nome: ${dados.nome}`, 20, 40);
    doc.text(`Posto/Grad: ${dados.graduacao}`, 20, 50);
    doc.text(`RG: ${dados.rg}`, 20, 60);
    doc.text(`Unidade: ${dados.unidadeServe}`, 20, 70);
    doc.text("--------------------------------------------------", 20, 80);
    doc.text(`LOCAL DA INSPEÇÃO: ${local}`, 20, 90);
    doc.text(`MÉDICA RESPONSÁVEL: ${medica}`, 20, 100);
    doc.text(`DATA: ${data}`, 20, 110);
    doc.text(`TURNO DE CHEGADA: ${dados.horario}`, 20, 120);
    doc.text("--------------------------------------------------", 20, 130);
    doc.text("Apresente este documento impresso ou no celular no local.", 20, 145);
    
    doc.save(`Dermato_2026_${dados.rg}.pdf`);
}
</script>

</body>
</html>
