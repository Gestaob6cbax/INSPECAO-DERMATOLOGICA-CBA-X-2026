<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dermatologia 2026 - CBA X</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
        :root { --cba-color: #fb8c00; --cba-blue: #0a2c6d; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 10px; display: flex; justify-content: center; }
        .premium-card { width: 100%; max-width: 480px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid var(--cba-color); }
        header { text-align: center; margin-bottom: 20px; }
        header img { width: 70px; margin-bottom: 10px; }
        header h2 { color: var(--cba-blue); font-size: 1.2rem; text-transform: uppercase; margin: 5px 0; }
        .section-title { background: var(--cba-color); color: white; padding: 8px; font-size: 0.7rem; font-weight: bold; border-radius: 5px; margin-top: 15px; text-transform: uppercase; text-align: center; }
        label { display: block; margin-top: 12px; font-weight: 700; color: #333; font-size: 0.65rem; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #dfe4ea; border-radius: 8px; box-sizing: border-box; font-size: 15px; background: #fcfcfc; outline: none; }
        input:focus, select:focus { border-color: var(--cba-color); }
        .vagas-info { font-size: 0.85rem; font-weight: bold; margin-top: 10px; text-align: center; padding: 10px; border-radius: 5px; display: none; }
        .btn-confirmar { background: var(--cba-color); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 25px; text-transform: uppercase; font-size: 1rem; transition: 0.3s; }
        .btn-confirmar:disabled { background: #ccc; cursor: not-allowed; }
        #sucesso { display: none; text-align: center; }
        .caixa-confirmacao { border: 2px dashed var(--cba-color); padding: 20px; border-radius: 12px; margin: 15px 0; background: #fffdfd; }
        .nome-militar { color: var(--cba-blue); font-weight: 900; font-size: 1.1rem; text-transform: uppercase; }
        .link-outro { display:block; margin-top:15px; cursor:pointer; font-size:0.8rem; color:var(--cba-blue); text-decoration:underline; }
        
        @media print { 
            .btn-confirmar, .link-outro, #form-content, .section-title { display: none !important; } 
            .premium-card { border: none; box-shadow: none; width: 100%; } 
            #sucesso { display: block !important; } 
        }
    </style>
</head>
<body>

<div class="premium-card">
    <div id="form-content">
        <header>
            <img src="https://raw.githubusercontent.com/gestaob6cbax/INSPECAO-MEDICA-CBA-X-2026/main/logo_cba_x.png">
            <h2>Inspeção Dermatológica 2026</h2>
            <p style="font-weight: bold; font-size: 0.7rem; color: #666;">CBA X - 6ª Seção (ADM)</p>
        </header>

        <div class="section-title">Bloco 1: Identificação</div>
        <label>Unidade de Origem (Onde serve)</label>
        <select id="unidadeOrigem">
            <option value="">Selecione sua Unidade...</option>
            <option>CBA X</option>
            <option>CER</option> <option>1º GMAR BOTAFOGO</option>
            <option>2º GMAR BARRA DA TIJUCA</option>
            <option>3º GMAR COPACABANA</option>
            <option>4º GMAR ITAIPU</option>
            <option>GBS BOTAFOGO</option>
            <option>DBM 1/M PAQUETÁ</option>
            <option>DBM 2/M PISCINÃO</option>
            <option>DBM 3/M RECREIO</option>
            <option>DBM 4/M GUARATIBA</option>
            <option>DBM 5/M SEPETIBA</option>
            <option>DBM 6/M ITAIPU</option>
        </select>

        <label>Posto / Graduação</label>
        <select id="posto">
            <option value="">Selecione...</option>
            <option>SD BM</option><option>CB BM</option><option>3º SGT BM</option><option>2º SGT BM</option><option>1º SGT BM</option>
            <option>SUBTEN BM</option><option>2º TEN BM</option><option>1º TEN BM</option><option>CAP BM</option><option>MAJ BM</option>
            <option>TEN CEL BM</option><option>CEL BM</option>
        </select>
        
        <label>Nome Completo</label>
        <input type="text" id="nome" placeholder="NOME DO MILITAR" oninput="this.value = this.value.toUpperCase()">
        
        <label>RG Militar</label>
        <input type="number" id="rg" placeholder="Somente números">
        
        <label>WhatsApp</label>
        <input type="tel" id="telefone" placeholder="(XX) 9XXXX-XXXX">
        
        <label>E-mail</label>
        <input type="email" id="email" placeholder="militar@exemplo.com">

        <div class="section-title">Bloco 2: Local da Inspeção</div>
        <label>Polo de Atendimento</label>
        <select id="localInspecao" onchange="carregarDatas()">
            <option value="">Selecione o Polo...</option>
            <option value="CER">CER BARRA DA TIJUCA</option>
            <option value="BOTAFOGO">1º GMAR - BOTAFOGO (Atende DBM 1 e 2)</option>
            <option value="COPACABANA">3º GMAR - COPACABANA</option>
            <option value="ITAIPU">4º GMAR ITAIPU / DBM 6/M</option>
            <option value="RECREIO">DBM 3/M RECREIO (Atende DBM 4 e 5)</option>
        </select>

        <div class="section-title">Bloco 3: Data</div>
        <label>Escolha o Dia</label>
        <select id="data" onchange="verificarVagas()">
            <option value="">Selecione o Polo primeiro...</option>
        </select>
        <div id="msgVagas" class="vagas-info"></div>

        <button id="btnSalvar" class="btn-confirmar" onclick="salvar()">Confirmar Inscrição</button>
    </div>

    <div id="sucesso">
        <header>
            <img src="https://raw.githubusercontent.com/gestaob6cbax/INSPECAO-MEDICA-CBA-X-2026/main/logo_cba_x.png">
            <h2>Agendamento Confirmado</h2>
            <p>CBA X - 6ª Seção</p>
        </header>
        <div class="caixa-confirmacao">
            <div class="nome-militar" id="res-nome"></div>
            <div style="font-size: 0.85rem; margin-top: 10px; line-height: 1.6;">
                RG: <span id="res-rg" style="font-weight:bold;"></span><br>
                Polo: <span id="res-local" style="font-weight:bold;"></span><br>
                Data: <span id="res-data" style="font-weight:bold;"></span><br>
                <small>(Modalidade: Livre Demanda no dia escolhido)</small>
            </div>
        </div>
        <button class="btn-confirmar" style="background:#555" onclick="window.print()">🖨️ IMPRIMIR / SALVAR PDF</button>
        <span class="link-outro" onclick="location.reload()">Realizar outro agendamento</span>
    </div>
</div>

<script>
    const configLocal = {
        "CER": { datas: ["07/04/2026", "14/04/2026", "28/04/2026"], limite: 87 },
        "BOTAFOGO": { datas: ["11/06/2026", "02/07/2026"], limite: 97 },
        "COPACABANA": { datas: ["09/04/2026", "05/05/2026", "18/06/2026"], limite: 67 },
        "ITAIPU": { datas: ["12/05/2026", "07/07/2026"], limite: 77 },
        "RECREIO": { datas: ["22/06/2026", "06/07/2026", "20/07/2026"], limite: 87 }
    };

    const firebaseConfig = { 
        apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY", 
        authDomain: "inspecao-saude-cbax.firebaseapp.com", 
        projectId: "inspecao-saude-cbax", 
        storageBucket: "inspecao-saude-cbax.firebasestorage.app", 
        messagingSenderId: "1011281662526", 
        appId: "1:1011281662526:web:1028e8a8d140684e98376f" 
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function carregarDatas() {
        const local = document.getElementById("localInspecao").value;
        const comboData = document.getElementById("data");
        comboData.innerHTML = '<option value="">Selecione o dia...</option>';
        document.getElementById("msgVagas").style.display = "none";
        if(configLocal[local]) {
            configLocal[local].datas.forEach(d => {
                let opt = document.createElement("option"); opt.value = d; opt.text = d; comboData.add(opt);
            });
        }
    }

    async function verificarVagas() {
        const local = document.getElementById("localInspecao").value;
        const data = document.getElementById("data").value;
        const msg = document.getElementById("msgVagas");
        const btn = document.getElementById("btnSalvar");
        if(!local || !data) return;

        msg.style.display = "block";
        msg.innerText = "Consultando disponibilidade...";
        btn.disabled = true;

        const snapshot = await db.collection("agendamentos_dermato")
            .where("local", "==", local).where("data", "==", data).get();
