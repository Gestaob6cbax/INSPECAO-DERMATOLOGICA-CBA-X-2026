<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Agendamento Dermatológico 2026 - CBA X</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .card { background: white; max-width: 600px; margin: auto; padding: 25px; border-radius: 15px; border-top: 10px solid #d2691e; }
        input, select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #d2691e; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .vagas-info { background: #eee; padding: 10px; border-radius: 8px; font-size: 13px; margin-top: 10px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center;">Inspeção Dermatológica 2026</h2>
    <p style="text-align:center; font-size:14px;">CBA X - Comando de Bombeiros de Área</p>

    <form id="formDermato">
        <label>Dados do Militar:</label>
        <input type="text" id="nome" placeholder="Nome Completo" required>
        <input type="text" id="rg" placeholder="RG Militar (Apenas números)" required>
        
        <select id="graduacao" required>
            <option value="">Posto ou Graduação...</option>
            <option>SD BM</option><option>CB BM</option><option>3º SGT BM</option>
      <option>2º SGT BM</option><option>1º SGT BM</option><option>SUBTEN BM</option>
      <option>2º TEN BM</option><option>1º TEN BM</option><option>CAP BM</option>
      <option>MAJ BM</option><option>TEN CEL BM</option><option>CEL BM</option>
    </select>

        <input type="email" id="email" placeholder="E-mail" required>
        <input type="tel" id="telefone" placeholder="Telefone (WhatsApp)" required>
        
        <select id="unidadeServe" required>
            <option value="">Unidade onde serve...</option>
            <option value="CBA X">CBA X</option>
            <option value="1 GMAR">1º GMAR</option>
            <option value="2 GMAR">2º GMAR</option>
            <option value="3 GMAR">3º GMAR</option>
            <option value="4 GMAR">4º GMAR</option>
            <option value="GBS">GBS</option>
            <option value="CER">CER</option>
        </select>

        <hr>
        <label>Local e Data da Inspeção:</label>
        <select id="dataLocal" onchange="verificarVagas()" required>
            <option value="">Selecione o local e data...</option>
            <option value="07/04/2026|CER Barra" data-max="83">07/04/2026 - CER Barra da Tijuca</option>
            <option value="14/04/2026|CER Barra" data-max="83">14/04/2026 - CER Barra da Tijuca</option>
            <option value="28/04/2026|CER Barra" data-max="83">28/04/2026 - CER Barra da Tijuca</option>
            <option value="09/04/2026|3º GMAR" data-max="77">09/04/2026 - 3º GMAR Copacabana</option>
            </select>

        <div id="displayVagas" class="vagas-info" style="display:none">
            <span>Vagas Restantes: <b id="numVagas" style="color:green">--</b></span>
        </div>

        <select id="horario" required>
            <option value="">Selecione o horário...</option>
            <option value="08:00 às 09:00">08:00 às 09:00</option>
            <option value="09:00 às 10:00">09:00 às 10:00</option>
            <option value="10:00 às 11:00">10:00 às 11:00</option>
            <option value="11:00 às 12:00">11:00 às 12:00</option>
            <option value="13:00 às 14:00">13:00 às 14:00</option>
            <option value="14:00 às 15:00">14:00 às 15:00</option>
            <option value="15:00 às 16:00">15:00 às 16:00</option>
            <option value="16:00 às 17:00">16:00 às 17:00</option>
        </select>

        <button type="submit">Finalizar Agendamento e Gerar PDF</button>
    </form>
</div>

<script>
    // Aqui você conectará seu Firebase para validar o RG Único e contar vagas
    function verificarVagas() {
        document.getElementById('displayVagas').style.display = 'flex';
        // Lógica de contagem real do Firebase entraria aqui
        document.getElementById('numVagas').innerText = "Disponível"; 
    }

    document.getElementById('formDermato').onsubmit = function(e) {
        e.preventDefault();
        gerarPDF();
    };

    function gerarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        const dados = {
            nome: document.getElementById('nome').value,
            rg: document.getElementById('rg').value,
            local: document.getElementById('dataLocal').value.split('|')[1],
            data: document.getElementById('dataLocal').value.split('|')[0],
            hora: document.getElementById('horario').value
        };

        doc.setFontSize(18);
        doc.text("Comprovante de Agendamento - Dermatologia", 20, 20);
        doc.setFontSize(12);
        doc.text(`Nome: ${dados.nome}`, 20, 40);
        doc.text(`RG: ${dados.rg}`, 20, 50);
        doc.text(`Local: ${dados.local}`, 20, 60);
        doc.text(`Data: ${dados.data}`, 20, 70);
        doc.text(`Horário Sugerido: ${dados.hora}`, 20, 80);
        doc.text("Apresente este comprovante no local da inspeção.", 20, 100);
        
        doc.save(`Agendamento_${dados.rg}.pdf`);
        alert("Agendamento realizado! O seu PDF foi gerado.");
    }
</script>
</body>
</html>
