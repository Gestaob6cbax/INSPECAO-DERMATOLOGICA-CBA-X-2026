<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dermatologia 2026 - CBA X</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
        :root { --cba-orange: #fb8c00; --cba-blue: #0a2c6d; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 10px; display: flex; justify-content: center; }
        
        .premium-card { width: 100%; max-width: 480px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); border-top: 8px solid var(--cba-orange); }
        
        header { text-align: center; margin-bottom: 25px; }
        header img { width: 80px; }
        header h2 { color: var(--cba-blue); margin: 10px 0 5px; font-size: 1.3rem; text-transform: uppercase; }
        
        .section-title { background: var(--cba-orange); color: white; padding: 8px 15px; font-size: 0.75rem; font-weight: bold; border-radius: 5px; margin-top: 20px; text-transform: uppercase; text-align: center; }
        
        label { display: block; margin-top: 15px; font-weight: 700; color: #333; font-size: 0.7rem; text-transform: uppercase; }
        input, select { width: 100%; padding: 14px; margin-top: 5px; border: 2px solid #dfe4ea; border-radius: 10px; box-sizing: border-box; font-size: 16px; background-color: #fcfcfc; display: block; }
        
        .btn-confirmar { background: var(--cba-orange); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 30px; font-size: 1.1rem; text-transform: uppercase; width: 100%; }

        /* ESTILOS DO SEU RECIBO (6ª SEÇÃO) */
        #sucesso { display: none; text-align: center; }
        .caixa-confirmacao { border: 2px dashed var(--cba-orange); padding: 25px; border-radius: 15px; margin: 20px 0; background: #fffdfd; text-align: center; }
        .check-icon { color: var(--cba-orange); font-weight: bold; margin-bottom: 10px; font-size: 1.1rem; }
        .nome-militar { color: var(--cba-blue); font-weight: 900; font-size: 1.2rem; text-transform: uppercase; margin-bottom: 10px; }
        .detalhes-recibo { font-size: 0.85rem; color: #444; line-height: 1.5; }
        
        .btn-pdf { background: #555; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .link-outro { display: block; margin-top: 15px; color: var(--cba-blue); font-size: 0.8rem; text-decoration: underline; cursor: pointer; }

        @media print { .btn-pdf, .link-outro, .btn-confirmar { display: none; } .premium-card { border: none; box-shadow: none; } }
    </style>
</head>
<body>

<div class="premium-card">
    <div id="form-content">
        <header>
            <img src="https://raw.githubusercontent.com/gestaob6cbax/INSPECAO-MEDICA-CBA-X-2026/main/logo_cba_x.png">
            <h2>Inspeção Dermatológica 2026</h2>
            <p style="font-weight: bold; font-size: 0.7rem; color: #666;">CBA X - 6°Seção</p>
        </header>

        <div class="section-title">Dados do Militar</div>
        
        <label>Unidade de Origem (Onde serve)</label>
        <select id="unidadeServe" onchange="atualizarDatas()">
            <option value="">Selecione sua unidade...</option>
            <option value="CER">CBA X (CER BARRA)</option>
            <option value="1GMAR">1º GMAR</option>
            <option value="2GMAR">2º GMAR</option>
            <option value="3GMAR">3º GMAR</option>
            <option value="4GMAR">4º GMAR</option>
            <option value="RECREIO">DBM 3/M (RECREIO)</option>
        </select>

        <label>Posto / Graduação</label>
        <select id="posto">
            <option value="">Selecione...</option>
            <option>SD BM</option><option>CB BM</option><option>3º SGT BM</option><option>2º SGT BM</option><option>1º SGT BM</option><option>SUBTEN BM</option>
            <option>2º TEN BM</option><option>1º TEN BM</option><option>CAP BM</option><option>MAJ BM</option><option>TEN CEL BM</option><option>CEL BM</option>
        </select>

        <input type="text" id="nome" placeholder="NOME COMPLETO" oninput="this.value = this.value.toUpperCase()">
        <input type="number" id="rg" placeholder="RG MILITAR">

        <div class="section-title">Agendamento</div>
        <label>Data da Inspeção</label>
        <select id="data">
            <option value="">Selecione a Unidade primeiro...</option>
        </select>

        <button id="btnSalvar" class="btn-confirmar" onclick="salvar()">Confirmar Inscrição</button>
    </div>

    <div id="sucesso">
        <header>
            <img src="https://raw.githubusercontent.com/gestaob6cbax/INSPECAO-MEDICA-CBA-X-2026/main/logo_cba_x.png">
            <h2>Inspeção Dermatológica 2026</h2>
            <p style="font-weight: bold; font-size: 0.7rem; color: #666;">CBA X - 6°Seção</p>
        </header>

        <div class="caixa-confirmacao">
            <div class="check-icon">✅ AGENDAMENTO CONFIRMADO</div>
            <div class="nome-militar" id="res-nome"></div>
            <div class="detalhes-recibo">
                RG: <span id="res-rg"></span> | Local: CBA X | Data: <span id="res-data"></span> (livre demanda)
            </div>
        </div>

        <button class="btn-pdf" onclick="window.print()">🖨️ IMPRIMIR / SALVAR PDF</button>
        <span class="link-outro" onclick="location.reload()">Realizar outro agendamento</span>
    </div>
</div>

<script>
    // Configurações Inteligentes solicitadas
    const configDermato = {
        "CER": { datas: ["07/04/2026", "14/04/2026", "28/04/2026"], limite: 87 },
        "3GMAR": { datas: ["09/04/2026", "05/05/2026", "18/06/2026"], limite: 67 },
        "4GMAR": { datas: ["12/05/2026", "07/07/2026"], limite: 77 },
        "1GMAR": { datas: ["11/06/2026", "02/07/2026"], limite: 97 },
        "RECREIO": { datas: ["22/06/2026", "06/07/2026", "20/07/2026"], limite: 87 }
    };

    const firebaseConfig = { apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY", authDomain: "inspecao-saude-cbax.firebaseapp.com", projectId: "inspecao-saude-cbax", storageBucket: "inspecao-saude-cbax.firebasestorage.app", messagingSenderId: "1011281662526", appId: "1:1011281662526:web:1028e8a8d140684e98376f" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function atualizarDatas() {
        const unidade = document.getElementById("unidadeServe").value;
        const comboData = document.getElementById("data");
        comboData.innerHTML = '<option value="">Selecione o dia...</option>';
        if(configDermato[unidade]) {
            configDermato[unidade].datas.forEach(d => {
                let opt = document.createElement("option");
                opt.value = d; opt.text = d; comboData.add(opt);
            });
        }
    }

    async function salvar() {
        const btn = document.getElementById("btnSalvar");
        const dados = {
            nome: document.getElementById("nome").value.toUpperCase(),
            rg: document.getElementById("rg").value,
            posto: document.getElementById("posto").value,
            data: document.getElementById("data").value,
            unidade: document.getElementById("unidadeServe").value,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        if(!dados.nome || !dados.rg || !dados.data || !dados.posto) return alert("Preencha todos os campos!");

        btn.disabled = true;
        btn.innerText = "OK...";

        try {
            await db.collection("agendamentos_dermato").add(dados);
            document.getElementById("res-nome").innerText = dados.posto + " " + dados.nome;
            document.getElementById("res-rg").innerText = dados.rg;
            document.getElementById("res-data").innerText = dados.data;
            document.getElementById("form-content").style.display = "none";
            document.getElementById("sucesso").style.display = "block";
            window.scrollTo(0,0);
        } catch (e) {
            alert("Erro ao salvar.");
            btn.disabled = false;
            btn.innerText = "Confirmar Inscrição";
        }
    }
</script>
</body>
</html>
