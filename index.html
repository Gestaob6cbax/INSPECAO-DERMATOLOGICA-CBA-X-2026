<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dermatologia 2026 - CBA X</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
        :root { --cba-orange: #fb8c00; --cba-blue: #0a2c6d; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .premium-card { width: 100%; max-width: 480px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); border-top: 8px solid #d32f2f; }
        header { text-align: center; margin-bottom: 25px; }
        header img { width: 70px; }
        header h2 { color: var(--cba-blue); margin: 10px 0 5px; font-size: 1.3rem; text-transform: uppercase; }
        .section-title { background: var(--cba-orange); color: white; padding: 8px 15px; font-size: 0.75rem; font-weight: bold; border-radius: 5px; margin-top: 25px; text-transform: uppercase; text-align: center; }
        label { display: block; margin-top: 15px; font-weight: 700; color: #333; font-size: 0.75rem; text-transform: uppercase; }
        input, select { width: 100%; padding: 14px; margin-top: 6px; border: 2px solid #dfe4ea; border-radius: 10px; box-sizing: border-box; font-size: 16px; display: block; }
        .btn-confirmar { background: #2ecc71; color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 30px; font-size: 1.1rem; text-transform: uppercase; }
        
        /* ESTILO DO COMPROVANTE IGUAL AO PRINT */
        #sucesso { display: none; text-align: center; }
        .caixa-confirmacao { border: 2px dashed #d32f2f; padding: 25px; border-radius: 15px; margin: 20px 0; }
        .check-icon { color: #2ecc71; font-size: 1.5rem; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .nome-militar { color: var(--cba-blue); font-weight: 900; font-size: 1.1rem; text-transform: uppercase; margin: 10px 0; }
        .detalhes-recibo { font-size: 0.85rem; color: #555; line-height: 1.6; }
        .btn-pdf { background: #2ecc71; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; text-transform: uppercase; }
        .link-outro { display: block; margin-top: 15px; color: blue; text-decoration: underline; font-size: 0.8rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="premium-card">
    <div id="form-content">
        <header>
            <img src="https://raw.githubusercontent.com/gestaob6cbax/INSPECAO-MEDICA-CBA-X-2026/main/logo_cba_x.png">
            <h2>Inspeção Dermatológica 2026</h2>
            <p style="font-weight: bold; font-size: 0.7rem; color: #666;">CBA X - INSPEÇÃO PERIÓDICA / SALV. MARÍTIMO</p>
        </header>

        <div class="section-title">Dados do Militar</div>
        <input type="text" id="nome" placeholder="NOME COMPLETO" oninput="this.value = this.value.toUpperCase()">
        <input type="number" id="rg" placeholder="RG MILITAR">
        <select id="posto">
            <option value="">POSTO / GRADUAÇÃO</option>
            <option>SD BM</option><option>CB BM</option><option>3º SGT BM</option><option>2º SGT BM</option><option>1º SGT BM</option><option>SUBTEN BM</option>
            <option>OFICIAL</option>
        </select>
        <input type="tel" id="telefone" placeholder="TELEFONE (DDD + NÚMERO)">

        <div class="section-title">Agendamento</div>
        <select id="data">
            <option value="">SELECIONE A DATA</option>
            <option>10/03/2026</option>
            <option>17/03/2026</option>
        </select>

        <button id="btnSalvar" class="btn-confirmar" onclick="salvar()">Confirmar Inscrição</button>
    </div>

    <div id="sucesso">
        <header>
            <img src="https://raw.githubusercontent.com/gestaob6cbax/INSPECAO-MEDICA-CBA-X-2026/main/logo_cba_x.png">
            <h2>Inspeção Dermatológica 2026</h2>
            <p style="font-weight: bold; font-size: 0.7rem; color: #666;">CBA X - JUNTA DE SAÚDE</p>
        </header>

        <div class="caixa-confirmacao">
            <div class="check-icon">✅ AGENDAMENTO CONFIRMADO</div>
            <div class="nome-militar" id="res-nome"></div>
            <div class="detalhes-recibo">
                RG: <span id="res-rg"></span> | Local: CBA X | Data: <span id="res-data"></span> (Manhã)
            </div>
        </div>

        <button class="btn-pdf" onclick="window.print()">🖨️ IMPRIMIR / SALVAR PDF</button>
        <span class="link-outro" onclick="location.reload()">Realizar outro agendamento</span>
    </div>
</div>

<script>
    // Mesma configuração do seu Firebase (mantenha a sua)
    const firebaseConfig = { apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY", authDomain: "inspecao-saude-cbax.firebaseapp.com", projectId: "inspecao-saude-cbax", storageBucket: "inspecao-saude-cbax.firebasestorage.app", messagingSenderId: "1011281662526", appId: "1:1011281662526:web:1028e8a8d140684e98376f" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function salvar() {
        const dados = {
            nome: document.getElementById("nome").value,
            rg: document.getElementById("rg").value,
            posto: document.getElementById("posto").value,
            data: document.getElementById("data").value,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        if(!dados.nome || !dados.rg) return alert("Preencha tudo!");

        await db.collection("agendamentos_dermato").add(dados);

        document.getElementById("res-nome").innerText = dados.posto + " " + dados.nome;
        document.getElementById("res-rg").innerText = dados.rg;
        document.getElementById("res-data").innerText = dados.data;

        document.getElementById("form-content").style.display = "none";
        document.getElementById("sucesso").style.display = "block";
    }
</script>
</body>
</html>
