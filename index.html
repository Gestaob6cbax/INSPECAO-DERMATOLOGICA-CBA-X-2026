<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dermatologia 2026 - CBA X</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
        :root { --cba-orange: #fb8c00; --cba-blue: #0a2c6d; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .premium-card { width: 100%; max-width: 480px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); border-top: 8px solid var(--cba-orange); }
        header { text-align: center; margin-bottom: 25px; }
        header img { width: 90px; }
        header h2 { color: var(--cba-blue); margin: 10px 0 5px; font-size: 1.3rem; text-transform: uppercase; }
        .section-title { background: var(--cba-orange); color: white; padding: 8px 15px; font-size: 0.75rem; font-weight: bold; border-radius: 5px; margin-top: 25px; text-transform: uppercase; text-align: center; }
        label { display: block; margin-top: 15px; font-weight: 700; color: #333; font-size: 0.75rem; text-transform: uppercase; }
        input, select { width: 100%; padding: 14px; margin-top: 6px; border: 2px solid #dfe4ea; border-radius: 10px; box-sizing: border-box; font-size: 16px; background-color: #fcfcfc; display: block; }
        .vagas-badge { margin-top: 10px; padding: 12px; border-radius: 10px; text-align: center; font-size: 0.9rem; font-weight: bold; display: none; border: 1px solid; }
        .vagas-ok { background: #fff3e0; color: #e65100; border-color: #ffe0b2; }
        .btn-confirmar { background: linear-gradient(135deg, var(--cba-orange) 0%, #ef6c00 100%); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 30px; font-size: 1.1rem; text-transform: uppercase; }
        
        #sucesso { display: none; text-align: center; }
        .recibo { background: #fff; border: 2px solid #eee; padding: 20px; border-radius: 15px; text-align: left; margin-top: 20px; position: relative; }
        .recibo::before { content: ""; position: absolute; top: 0; left: 0; width: 5px; height: 100%; background: var(--cba-orange); }
        .recibo p { margin: 8px 0; font-size: 0.9rem; color: #444; border-bottom: 1px solid #f9f9f9; padding-bottom: 5px; }
        .recibo b { color: var(--cba-blue); font-size: 0.7rem; text-transform: uppercase; display: block; }
        .recibo span { font-size: 1.1rem; font-weight: bold; color: #222; }
        .icon-check { font-size: 50px; color: #2e7d32; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="premium-card">
    <div id="form-content">
        <header>
            <img src="https://raw.githubusercontent.com/gestaob6cbax/INSPECAO-MEDICA-CBA-X-2026/main/logo_cba_x.png" alt="CBA X">
            <h2>Dermatologia 2026</h2>
            <p style="font-weight: bold; font-size: 0.8rem; color: #666;">CBA X - PREVENÇÃO</p>
        </header>

        <div class="section-title">Dados do Militar</div>
        
        <label>Unidade de Origem</label>
        <select id="unidadeOrigem" onchange="atualizarUnidadesDestino()">
            <option value="">Selecione onde você serve...</option>
            <option value="CBA X">CBA X</option>
            <option value="CER BARRA">CER BARRA DA TIJUCA</option>
            <option value="2GMAR">2º GMAR BARRA DA TIJUCA</option>
            <option value="GBS">GBS BOTAFOGO</option>
            <option value="3GMAR">3º GMAR COPACABANA</option>
            <option value="4GMAR">4º GMAR ITAIPU</option>
            <option value="DBM 1/M">DBM 1/M PAQUETÁ</option>
            <option value="DBM 2/M">DBM 2/M PISCINÃO DE RAMOS</option>
            <option value="DBM 3/M">DBM 3/M RECREIO DOS BANDEIRANTES</option>
            <option value="DBM 4/M">DBM 4/M BARRA DE GUARATIBA</option>
            <option value="DBM 5/M">DBM 5/M SEPETIBA</option>
            <option value="DBM 6/M">DBM 6/M ITAIPU</option>
        </select>

        <label>Posto / Graduação</label>
        <select id="posto">
            <option value="">Selecione...</option>
            <option>SD BM</option><option>CB BM</option><option>3º SGT BM</option>
            <option>2º SGT BM</option><option>1º SGT BM</option><option>SUBTEN BM</option>
            <option>2º TEN BM</option><option>1º TEN BM</option><option>CAP BM</option>
            <option>MAJ BM</option><option>TEN CEL BM</option><option>CEL BM</option>
        </select>
        
        <input type="text" id="nome" placeholder="NOME COMPLETO" oninput="this.value = this.value.toUpperCase()">
        <input type="number" id="rg" placeholder="RG MILITAR">
        <input type="tel" id="telefone" placeholder="TELEFONE (DDD + NÚMERO)">
        <input type="email" id="email" placeholder="E-MAIL">

        <div class="section-title">Agendamento</div>
        
        <label>Local da Inspeção</label>
        <select id="unidadeDestino" onchange="atualizarDatas()">
            <option value="">Selecione a Unidade de Inspeção...</option>
            <option value="CER">CER BARRA (SEDE)</option>
            <option value="3GMAR">3º GMAR (COPACABANA)</option>
            <option value="4GMAR">4º GMAR (ITAIPU)</option>
            <option value="1GMAR">1º GMAR (BOTAFOGO)</option>
            <option value="RECREIO">DBM 3/M (RECREIO)</option>
        </select>

        <label>Data</label>
        <select id="data" onchange="verificarVagas()">
            <option value="">Escolha o Local acima primeiro...</option>
        </select>

        <div id="statusVagas" class="vagas-badge"></div>
        <button id="btnSalvar" class="btn-confirmar" onclick="salvar()">Confirmar Inscrição</button>
    </div>

    <div id="sucesso">
        <div class="icon-check">✅</div>
        <h2 style="color: var(--cba-blue);">AGENDADO!</h2>
        <div class="recibo">
            <p><b>Militar:</b> <span id="res-nome"></span></p>
            <p><b>RG:</b> <span id="res-rg"></span></p>
            <p><b>Posto/Graduação:</b> <span id="res-posto"></span></p>
            <p><b>Unidade de Origem:</b> <span id="res-origem"></span></p>
            <p><b>Unidade de Inspeção:</b> <span id="res-local"></span></p>
            <p><b>Data:</b> <span id="res-data"></span></p>
            <p><b>Horário:</b> <span>A partir das 08:00h</span></p>
        </div>
        <p style="font-size: 0.75rem; color: red; margin-top: 15px; font-weight: bold;">* Apresente sua identidade militar no local.</p>
        <button class="btn-confirmar" onclick="location.reload()">Sair / Novo</button>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY",
        authDomain: "inspecao-saude-cbax.firebaseapp.com",
        projectId: "inspecao-saude-cbax",
        storageBucket: "inspecao-saude-cbax.firebasestorage.app",
        messagingSenderId: "1011281662526",
        appId: "1:1011281662526:web:1028e8a8d140684e98376f"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const configDermato = {
        "CER": { datas: ["07/04/2026", "14/04/2026", "28/04/2026"], limite: 87 },
        "3GMAR": { datas: ["09/04/2026", "05/05/2026", "18/06/2026"], limite: 67 },
        "4GMAR": { datas: ["12/05/2026", "07/07/2026"], limite: 77 },
        "1GMAR": { datas: ["11/06/2026", "02/07/2026"], limite: 97 },
        "RECREIO": { datas: ["22/06/2026", "06/07/2026", "20/07/2026"], limite: 87 }
    };

    function atualizarDatas() {
        const local = document.getElementById("unidadeDestino").value;
        const combo = document.getElementById("data");
        combo.innerHTML = '<option value="">Selecione o dia...</option>';
        if(local && configDermato[local]) {
            configDermato[local].datas.forEach(d => {
                let opt = document.createElement("option");
                opt.value = d; opt.text = d;
                combo.add(opt);
            });
        }
    }

    async function verificarVagas() {
        const local = document.getElementById("unidadeDestino").value;
        const dataSel = document.getElementById("data").value;
        const badge = document.getElementById("statusVagas");
        if (!local || !dataSel) return;
        badge.style.display = "block";
        badge.innerText = "🔍 Verificando vagas...";
        const snap = await db.collection("agendamentos_dermato").where("unidadeDestino", "==", local).where("data", "==", dataSel).get();
        const restam = configDermato[local].limite - snap.size;
        badge.innerText = `✅ ${restam} VAGAS DISPONÍVEIS`;
        badge.className = "vagas-badge vagas-ok";
    }

    async function salvar() {
        const btn = document.getElementById("btnSalvar");
        const selDestino = document.getElementById("unidadeDestino");
        const rg = document.getElementById("rg").value.trim();
        
        const d = {
            unidadeOrigem: document.getElementById("unidadeOrigem").value,
            posto: document.getElementById("posto").value,
            nome: document.getElementById("nome").value.trim().toUpperCase(),
            rg: rg,
            telefone: document.getElementById("telefone").value.trim(),
            email: document.getElementById("email").value.trim().toLowerCase(),
            unidadeDestino: selDestino.value,
            localNome: selDestino.options[selDestino.selectedIndex].text,
            data: document.getElementById("data").value,
            tipo: "DERMATOLOGIA",
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        if(!d.nome || !d.rg || !d.data || !d.unidadeOrigem || !d.posto || !d.telefone || !d.email) {
            alert("Preencha todos os campos do Militar e do Agendamento!"); return;
        }

        btn.disabled = true;
        btn.innerText = "VERIFICANDO...";

        try {
            const check = await db.collection("agendamentos_dermato").where("rg", "==", rg).get();
            if(!check.empty) {
                alert("Este RG já possui agendamento para a Dermatologia!");
                btn.disabled = false; btn.innerText = "Confirmar Inscrição";
                return;
            }

            await db.collection("agendamentos_dermato").add(d);
            document.getElementById("res-nome").innerText = d.nome;
            document.getElementById("res-rg").innerText = d.rg;
            document.getElementById("res-posto").innerText = d.posto;
            document.getElementById("res-origem").innerText = d.unidadeOrigem;
            document.getElementById("res-local").innerText = d.localNome;
            document.getElementById("res-data").innerText = d.data;

            document.getElementById("form-content").style.display = "none";
            document.getElementById("sucesso").style.display = "block";
        } catch (e) { alert("Erro ao salvar."); btn.disabled = false; }
    }
</script>
</body>
</html>
