<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AGENDAMENTO DERMATOLOGIA – CBA X – 2026</title>
    <style>
        /* Cor Laranja - Campanha de Combate ao Câncer de Pele */
        body { font-family: 'Segoe UI', Arial, sans-serif; background:#f4f4f4; margin:0; padding:0; }
        .header-top { background: #ff8c00; color: white; padding: 25px 10px; text-align: center; border-bottom: 5px solid #e67e00; margin-bottom: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header-top img { max-width: 90px; margin-bottom: 10px; }
        .header-top h2 { margin: 0; font-size: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .header-top p { margin: 5px 0 0; font-size: 14px; opacity: 0.9; }

        .container { max-width: 600px; margin: -40px auto 50px; background:#fff; padding:30px; border-radius:12px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); border-top: 4px solid #ff8c00; }
        input, select, button { width:100%; padding:14px; margin-bottom:15px; border-radius:8px; border:1px solid #ddd; font-size:15px; box-sizing:border-box; transition: 0.3s; }
        input:focus, select:focus { border-color: #ff8c00; outline: none; box-shadow: 0 0 8px rgba(255,140,0,0.1); }

        button { background:#ff8c00; color:#fff; border:none; cursor:pointer; font-weight:bold; font-size: 16px; text-transform: uppercase; }
        button:hover { background:#e67e00; transform: translateY(-2px); }
        button:disabled { background:#ccc !important; cursor:not-allowed; transform: none; }

        /* Cronômetro de Vagas */
        #vagasBox { 
            display:none; padding:15px; border-radius:8px; margin-bottom:15px; 
            text-align:center; font-weight:bold; border: 1px solid #ddd; font-size: 15px;
        }
        .vagas-ok { background: #fff5e6; color: #855a00; border-color: #ffe0b3 !important; }
        .vagas-alerta { background: #fffaf0; color: #9c4221; border-color: #feebc8 !important; }
        .vagas-esgotado { background: #fff5f5; color: #c53030; border-color: #feb2b2 !important; }

        #comprovanteBox { display:none; text-align:left; background:#fffafa; border:2px solid #ff8c00; border-radius:12px; padding:25px; margin-top:14px; }
        #comprovanteBox h3 { margin:0 0 15px 0; color: #ff8c00; border-bottom: 2px solid #ff8c00; padding-bottom: 10px; text-align: center; }
        .linha { margin:10px 0; font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 5px; color: #333; }
        .linha b { color: #ff8c00; width: 140px; display: inline-block; }
        
        .btnRow { display:flex; gap:10px; flex-wrap:wrap; margin-top:20px; }
        .btnPrint { background:#28a745; width: auto; flex-grow: 1; }
        .btnNova { background:#4b5563; width: auto; flex-grow: 1; }

        @media print {
            body { background:#fff; }
            .container { max-width:100%; margin:0; box-shadow: none; border: none; }
            form, .header-top, #vagasBox { display:none !important; }
            #comprovanteBox { display:block !important; border:none; width: 100%; padding: 0; }
        }
    </style>
</head>
<body>

<div class="header-top">
    <img src="https://raw.githubusercontent.com/gestaob6cbax/INSPECAO-MEDICA-CBA-X-2026/main/logo_cba_x.png" alt="Logo CBA X" />
    <h2>DERMATOLOGIA – CBA X</h2>
    <p>Prevenção e Cuidado com a Tropa</p>
</div>

<div class="container">
    <form id="formAgendamento" autocomplete="off">
        <input type="text" id="nome" placeholder="Nome completo" required />
        <input type="text" id="rg" placeholder="RG Militar" required />
        <input type="tel" id="telefone" placeholder="Telefone / WhatsApp" required />
        
        <select id="unidade" required>
            <option value="">Selecione o Local de Atendimento</option>
            <option>CBA X (Sede)</option>
            <option>1º GMar - Botafogo</option>
            <option>2º GMar - Barra</option>
            <option>3º GMar - Copacabana</option>
            <option>4º GMar - Itaipu</option>
        </select>

        <select id="dataSelect" required><option value="">Selecione a Data</option></select>

        <div id="vagasBox"></div>
        
        <select id="turno" required>
            <option value="">Selecione o Turno</option>
            <option value="Manhã">Manhã (08h às 12h)</option>
            <option value="Tarde">Tarde (13h às 16h)</option>
        </select>
        
        <button type="submit" id="btnAgendar">Confirmar Agendamento</button>
    </form>
    
    <div id="comprovanteBox">
        <h3>✅ AGENDAMENTO CONFIRMADO</h3>
        <div class="linha"><b>Militar:</b> <span id="cNome"></span></div>
        <div class="linha"><b>RG:</b> <span id="cRg"></span></div>
        <div class="linha"><b>Local:</b> <span id="cUnidade"></span></div>
        <div class="linha"><b>Data:</b> <span id="cData"></span></div>
        <div class="linha"><b>Turno:</b> <span id="cTurno"></span></div>
        <div class="linha"><b>Protocolo:</b> <span id="cProto" style="font-weight: bold;"></span></div>
        
        <div class="btnRow">
            <button type="button" class="btnPrint" onclick="window.print()">🖨️ Imprimir</button>
            <button type="button" class="btnNova" onclick="location.reload()">Novo Agendamento</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getFirestore, collection, doc, runTransaction, serverTimestamp, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    
    // --- COLE AQUI O SEU FIREBASE CONFIG DO DERMATO ---
    const firebaseConfig = {
        apiKey: "SUA_API_KEY",
        authDomain: "dermato-cbax.firebaseapp.com",
        projectId: "dermato-cbax",
        storageBucket: "dermato-cbax.appspot.com",
        messagingSenderId: "ID_SENDER",
        appId: "ID_APP"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const LIMITE_POR_TURNO = 7;

    const unidadeEl = document.getElementById("unidade");
    const dataSelect = document.getElementById("dataSelect");
    const turnoEl = document.getElementById("turno");
    const vagasBox = document.getElementById("vagasBox");
    const btnAgendar = document.getElementById("btnAgendar");

    function formatBR(ymd) { return ymd.split('-').reverse().join('/'); }

    // Gerador automático de datas (Exemplo: Segundas e Quartas)
    unidadeEl.addEventListener("change", () => {
        dataSelect.innerHTML = '<option value="">Selecione a Data</option>';
        let d = new Date();
        for(let i=0; i<60; i++) {
            d.setDate(d.getDate() + 1);
            if(d.getDay() === 1 || d.getDay() === 3) { // 1=Segunda, 3=Quarta
                const ymd = d.toISOString().split('T')[0];
                dataSelect.add(new Option(formatBR(ymd), ymd));
            }
        }
    });

    async function atualizarCronometro() {
        const dataVal = dataSelect.value;
        const localVal = unidadeEl.value;
        const turnoVal = turnoEl.value;

        if (!dataVal || !localVal || !turnoVal) { vagasBox.style.display = "none"; return; }

        vagasBox.style.display = "block";
        vagasBox.textContent = "⌛ Verificando disponibilidade...";
        btnAgendar.disabled = true;

        try {
            const q = query(collection(db, "agendamentos"), 
                            where("data", "==", dataVal), 
                            where("unidade", "==", localVal),
                            where("turno", "==", turnoVal));
            
            const snap = await getDocs(q);
            const ocupadas = snap.size;
            const restam = LIMITE_POR_TURNO - ocupadas;

            if (restam <= 0) {
                vagasBox.className = "vagas-esgotado";
                vagasBox.textContent = `❌ TURNO ${turnoVal.toUpperCase()} ESGOTADO`;
                btnAgendar.disabled = true;
            } else {
                vagasBox.className = restam <= 2 ? "vagas-alerta" : "vagas-ok";
                vagasBox.textContent = `✅ ${restam} VAGAS DISPONÍVEIS (Turno ${turnoVal})`;
                btnAgendar.disabled = false;
            }
        } catch (e) { vagasBox.textContent = "Erro ao carregar vagas."; }
    }

    dataSelect.addEventListener("change", atualizarCronometro);
    turnoEl.addEventListener("change", atualizarCronometro);

    document.getElementById("formAgendamento").addEventListener("submit", async (e) => {
        e.preventDefault();
        const rg = document.getElementById("rg").value.trim().replace(/\D/g, "");
        btnAgendar.disabled = true;

        try {
            const lockRef = doc(db, "rg_locks", rg);
            await runTransaction(db, async (tx) => {
                const lSnap = await tx.get(lockRef);
                if (lSnap.exists()) throw new Error("JÁ AGENDADO");

                const q = query(collection(db, "agendamentos"), 
                                where("data", "==", dataSelect.value), 
                                where("unidade", "==", unidadeEl.value),
                                where("turno", "==", turnoEl.value));
                const s = await getDocs(q);
                if (s.size >= LIMITE_POR_TURNO) throw new Error("ESGOTADO");

                const agRef = doc(collection(db, "agendamentos"));
                const dados = {
                    nome: document.getElementById("nome").value.toUpperCase(),
                    rg, unidade: unidadeEl.value, data: dataSelect.value, 
                    data_br: formatBR(dataSelect.value), turno: turnoEl.value, criadoEm: serverTimestamp()
                };
                tx.set(agRef, dados);
                tx.set(lockRef, { rg });

                document.getElementById("cNome").textContent = dados.nome;
                document.getElementById("cRg").textContent = dados.rg;
                document.getElementById("cUnidade").textContent = dados.unidade;
                document.getElementById("cData").textContent = dados.data_br;
                document.getElementById("cTurno").textContent = dados.turno;
                document.getElementById("cProto").textContent = `DERM-${rg}-${dados.data.replace(/-/g,"")}`;
            });
            document.getElementById("formAgendamento").style.display = "none";
            document.getElementById("comprovanteBox").style.display = "block";
        } catch (err) {
            alert(err.message === "JÁ AGENDADO" ? "⚠️ RG já possui agendamento." : "❌ Vagas esgotadas para este turno.");
            btnAgendar.disabled = false;
        }
    });
</script>
</body>
</html>
